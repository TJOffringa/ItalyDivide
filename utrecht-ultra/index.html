<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Utrecht Ultra 2026 — Bomba Tracker</title>
  <style>
    :root {
      --bg:      #0a0f1e;
      --surface: #111827;
      --border:  #1e2d4a;
      --text:    #e8eaf0;
      --muted:   #6b7a99;
      --red:     #e8194c;
      --teal:    #00c4d4;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    #header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    #header-left { display: flex; align-items: center; gap: 12px; }
    #back { font-size: 12px; color: var(--muted); text-decoration: none; }
    #back:hover { color: var(--text); }
    #race-title { font-size: 15px; font-weight: 700; }
    #race-badge {
      font-size: 10px; font-weight: 700;
      background: rgba(0,196,212,.12); color: var(--teal);
      border: 1px solid rgba(0,196,212,.3);
      padding: 2px 8px; border-radius: 20px;
    }
    #start-info { font-size: 11px; color: var(--muted); text-align: right; }

    #tracker-frame {
      flex: 1;
      border: none;
      width: 100%;
      display: block;
    }

    #pre-start {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 40px 20px;
      text-align: center;
    }
    #countdown-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    #countdown-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
    #countdown-timer { font-size: 40px; font-weight: 800; font-variant-numeric: tabular-nums; color: var(--teal); }
    #countdown-date  { font-size: 13px; color: var(--muted); }
    #pre-links { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    .pre-link {
      font-size: 13px;
      padding: 8px 16px;
      border-radius: 8px;
      text-decoration: none;
      border: 1px solid var(--border);
      color: var(--muted);
      transition: border-color .15s, color .15s;
    }
    .pre-link:hover { border-color: var(--teal); color: var(--teal); }
    .pre-link.primary {
      background: var(--teal);
      color: #0a0f1e;
      border-color: var(--teal);
      font-weight: 700;
    }
    .pre-link.primary:hover { background: #00b0bf; }
  </style>
</head>
<body>

<div id="header">
  <div id="header-left">
    <a id="back" href="../index.html">← Bomba Tracker</a>
    <div id="race-title">Utrecht Ultra 2026</div>
    <div id="race-badge">Binnenkort</div>
  </div>
  <div id="start-info">Start: 23 mei 2026 · 18:00</div>
</div>

<div id="pre-start">
  <div id="countdown-box">
    <div id="countdown-label">Race start over</div>
    <div id="countdown-timer">—</div>
    <div id="countdown-date">23 mei 2026 · 18:00 CEST</div>
  </div>
  <div id="pre-links">
    <a class="pre-link primary" href="https://www.followmychallenge.com/live/utrecht-ultra-2026/" target="_blank">
      🗺 Live tracking (Follow My Challenge)
    </a>
    <a class="pre-link" href="https://dotwatcher.cc/race/utrecht-ultra-2026" target="_blank">
      📊 DotWatcher Race Flow
    </a>
  </div>
</div>

<!-- Live iframe — shown after race start -->
<iframe id="tracker-frame" style="display:none"
  src="https://www.followmychallenge.com/live/utrecht-ultra-2026/"
  allow="geolocation">
</iframe>

<script>
'use strict';
const RACE_START = new Date('2026-05-23T16:00:00Z').getTime(); // 18:00 CEST = 16:00 UTC

function tick() {
  const now  = Date.now();
  const diff = RACE_START - now;

  if (diff <= 0) {
    // Race is live — show iframe
    document.getElementById('pre-start').style.display = 'none';
    document.getElementById('tracker-frame').style.display = 'block';
    document.getElementById('race-badge').textContent = 'Live';
    document.getElementById('race-badge').style.cssText =
      'background:rgba(232,25,76,.15);color:#e8194c;border:1px solid rgba(232,25,76,.3);font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px';
    document.getElementById('start-info').style.display = 'none';
    clearInterval(timer);
    return;
  }

  const d  = Math.floor(diff / 86400000);
  const h  = Math.floor((diff % 86400000) / 3600000);
  const m  = Math.floor((diff % 3600000)  / 60000);
  const s  = Math.floor((diff % 60000)    / 1000);

  const parts = [];
  if (d > 0) parts.push(`${d}d`);
  parts.push(String(h).padStart(2,'0') + 'u');
  parts.push(String(m).padStart(2,'0') + 'm');
  parts.push(String(s).padStart(2,'0') + 's');
  document.getElementById('countdown-timer').textContent = parts.join(' ');
}

const timer = setInterval(tick, 1000);
tick();
</script>
</body>
</html>
