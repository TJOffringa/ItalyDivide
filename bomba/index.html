<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bomba Tracker</title>
  <style>
    :root {
      --bg:      #f5f6f8;
      --surface: #ffffff;
      --border:  #e5e7eb;
      --text:    #111827;
      --muted:   #6b7280;
      --navy:    #1e3a6e;
      --red:     #e8194c;
      --teal:    #00b4c2;
      --teal-bg: #e6f9fb;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
      min-height: 100dvh;
    }

    #header {
      background: var(--navy);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    #header img { height: 38px; }
    #logo-text {
      font-size: 20px; font-weight: 900; letter-spacing: .04em;
      color: #ffffff; display: none;
    }
    #header-sub { font-size: 11px; color: rgba(255,255,255,.55); margin-top: 2px; }

    #main { max-width: 960px; margin: 0 auto; padding: 32px 20px 60px; }

    #section-title {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .1em; color: var(--muted); margin-bottom: 16px;
    }

    #race-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .race-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
      transition: box-shadow .15s, transform .15s;
    }
    .race-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.1); transform: translateY(-2px); }
    .race-card.finished { opacity: .65; }
    .race-card.finished:hover { transform: none; box-shadow: 0 1px 4px rgba(0,0,0,.06); }

    .card-accent {
      height: 5px;
      background: linear-gradient(90deg, var(--red), #00c4d4);
    }
    .race-card.finished .card-accent { background: var(--border); }

    .card-body { padding: 16px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .card-top  { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
    .card-name { font-size: 15px; font-weight: 700; color: var(--navy); line-height: 1.25; }

    .card-badge {
      font-size: 10px; font-weight: 700; padding: 3px 8px;
      border-radius: 20px; white-space: nowrap; flex-shrink: 0;
    }
    @keyframes p { 0%,100%{opacity:1} 50%{opacity:.3} }
    .badge-live     { background: #fde8ed; color: var(--red);  border: 1px solid #f9bece; }
    .badge-soon     { background: var(--teal-bg); color: #007a87; border: 1px solid #b2e8ed; }
    .badge-finished { background: #f3f4f6; color: var(--muted); border: 1px solid var(--border); }

    .card-meta { font-size: 12px; color: var(--muted); display: flex; flex-direction: column; gap: 3px; }

    .card-footer {
      border-top: 1px solid var(--border);
      padding: 10px 16px;
      font-size: 12px; font-weight: 600;
      color: var(--teal);
      display: flex; align-items: center; justify-content: space-between;
    }
    .race-card.finished .card-footer { color: var(--muted); }
  </style>
</head>
<body>

<div id="header">
  <img id="logo-img" src="../bomba-tracker-logo.png" alt="Bomba Tracker"
       onerror="this.style.display='none';document.getElementById('logo-text').style.display='block'">
  <div id="logo-text">BOMBA TRACKER</div>
  <div id="header-sub">Race tracking platform</div>
</div>

<div id="main">
  <div id="section-title">Races</div>
  <div id="race-grid">
    <!-- FMC races injected by JS -->
  </div>
</div>

<script>
const API = 'https://tracker.klikschaak.nl';

function raceBadge(start) {
  const now   = Date.now();
  const ms    = new Date(start).getTime();
  const diffD = (now - ms) / 86400000;
  if (diffD < 0)    return `<div class="card-badge badge-soon">Binnenkort</div>`;
  if (diffD < 14)   return `<div class="card-badge badge-live"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--red);margin-right:3px;animation:p 1.4s infinite;vertical-align:middle"></span>Live</div>`;
  return `<div class="card-badge badge-finished">Afgelopen</div>`;
}

function raceFooter(start) {
  const diffD = (Date.now() - new Date(start).getTime()) / 86400000;
  if (diffD < 0)  return `<span>Binnenkort</span><span>→</span>`;
  if (diffD < 14) return `<span>Bekijk tracker</span><span>→</span>`;
  return `<span>Bekijk archief</span><span>→</span>`;
}

async function loadRaces() {
  try {
    const r = await fetch(`${API}/api/races`);
    if (!r.ok) return;
    const races = await r.json();
    const grid  = document.getElementById('race-grid');

    // Sort: live first, then upcoming, then finished; within group by start desc
    races.sort((a, b) => {
      const now = Date.now();
      const da  = (now - new Date(a.start).getTime()) / 86400000;
      const db  = (now - new Date(b.start).getTime()) / 86400000;
      const statusA = da < 0 ? 1 : da < 14 ? 0 : 2;
      const statusB = db < 0 ? 1 : db < 14 ? 0 : 2;
      if (statusA !== statusB) return statusA - statusB;
      return new Date(b.start) - new Date(a.start);
    });

    const fragment = document.createDocumentFragment();
    for (const race of races) {
      const diffD    = (Date.now() - new Date(race.start).getTime()) / 86400000;
      const finished = diffD >= 14;
      const card     = document.createElement('a');
      card.className = 'race-card' + (finished ? ' finished' : '');
      card.href      = `../tracker/?race=${race.fmcCode}`;
      card.innerHTML = `
        <div class="card-accent"></div>
        <div class="card-body">
          <div class="card-top">
            <div class="card-name">${race.name}</div>
            ${raceBadge(race.start)}
          </div>
          <div class="card-meta">
            ${race.date   ? `<div>📅 ${race.date}</div>`     : ''}
            ${race.location ? `<div>📍 ${race.location}</div>` : ''}
            ${race.type   ? `<div>🚴 ${race.type}</div>`     : ''}
          </div>
        </div>
        <div class="card-footer">${raceFooter(race.start)}</div>`;
      fragment.appendChild(card);
    }
    grid.insertBefore(fragment, grid.firstChild);
  } catch(e) { console.warn('Races load failed:', e); }
}

loadRaces();
</script>
</body>
</html>
