<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bomba Tracker</title>
  <style>
    :root {
      --bg:       #0a0f1e;
      --surface:  #111827;
      --surface2: #1a2235;
      --border:   #1e2d4a;
      --text:     #e8eaf0;
      --muted:    #6b7a99;
      --navy:     #1e3a6e;
      --red:      #e8194c;
      --teal:     #00c4d4;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
      min-height: 100dvh;
    }

    #header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    #header img { height: 38px; }
    #logo-text {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: .04em;
      color: var(--red);
      display: none;
    }
    #header-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

    #main {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }

    #section-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--muted);
      margin-bottom: 16px;
    }

    #race-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .race-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      transition: border-color .15s, transform .15s;
    }
    .race-card:hover { border-color: var(--teal); transform: translateY(-2px); }
    .race-card.finished { opacity: .6; }
    .race-card.finished:hover { border-color: var(--muted); transform: none; }

    .card-accent {
      height: 5px;
      background: linear-gradient(90deg, var(--red), var(--teal));
    }
    .race-card.finished .card-accent { background: var(--border); }

    .card-body { padding: 16px; flex: 1; display: flex; flex-direction: column; gap: 8px; }

    .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }

    .card-name { font-size: 16px; font-weight: 700; line-height: 1.2; }

    .card-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .badge-live     { background: rgba(232,25,76,.15); color: var(--red);   border: 1px solid rgba(232,25,76,.3); }
    .badge-soon     { background: rgba(0,196,212,.12); color: var(--teal);  border: 1px solid rgba(0,196,212,.3); }
    .badge-finished { background: rgba(107,122,153,.1); color: var(--muted); border: 1px solid var(--border); }

    .card-meta { font-size: 12px; color: var(--muted); display: flex; flex-direction: column; gap: 3px; }

    .card-footer {
      border-top: 1px solid var(--border);
      padding: 10px 16px;
      font-size: 12px;
      color: var(--teal);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .race-card.finished .card-footer { color: var(--muted); }
  </style>
</head>
<body>

<div id="header">
  <img id="logo-img" src="../bomba-tracker-logo.png" alt="Bomba Tracker"
       onerror="this.style.display='none';document.getElementById('logo-text').style.display='block'">
  <div id="logo-text">BOMBA TRACKER</div>
  <div id="header-sub">Race tracking platform</div>
</div>

<div id="main">
  <div id="section-title">Races</div>
  <div id="race-grid">

    <a class="race-card" href="../utrecht-ultra/index.html">
      <div class="card-accent"></div>
      <div class="card-body">
        <div class="card-top">
          <div class="card-name">Utrecht Ultra 2026</div>
          <div class="card-badge badge-soon">Binnenkort</div>
        </div>
        <div class="card-meta">
          <div>📅 23 mei 2026</div>
          <div>📍 Utrecht, Nederland</div>
          <div>🚴 Ultra cycling</div>
        </div>
      </div>
      <div class="card-footer">
        <span>Bekijk tracker</span><span>→</span>
      </div>
    </a>

    <a class="race-card finished" href="../itdvd26/index.html">
      <div class="card-accent"></div>
      <div class="card-body">
        <div class="card-top">
          <div class="card-name">Italy Divide 2026</div>
          <div class="card-badge badge-finished">Afgelopen</div>
        </div>
        <div class="card-meta">
          <div>📅 1 mei 2026</div>
          <div>📍 Italië</div>
          <div>🚴 Ultra gravel</div>
        </div>
      </div>
      <div class="card-footer">
        <span>Bekijk archief</span><span>→</span>
      </div>
    </a>

  </div>
</div>

</body>
</html>
