<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Webcams testen — Tour Divide</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  :root { --teal:#14b8a6; --navy:#1c2635; --border:#dfe5ea; --muted:#6b7280; --red:#c0392b; }
  * { box-sizing: border-box; }
  html, body { height:100%; margin:0; }
  body { font-family:-apple-system,Segoe UI,Roboto,sans-serif; color:var(--navy); background:#f3f5f7; display:flex; flex-direction:column; }
  header { background:#fff; border-bottom:1px solid var(--border); padding:10px 16px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  header h1 { font-size:16px; margin:0; }
  header .sp { flex:1; }
  button { font-size:13px; padding:7px 12px; border-radius:7px; border:1px solid var(--border); background:#fff; cursor:pointer; }
  button.primary { background:var(--teal); color:#fff; border-color:var(--teal); font-weight:700; }
  button.keep { background:var(--teal); color:#fff; border-color:var(--teal); font-weight:700; }
  button.drop { background:#fff; color:var(--red); border-color:var(--red); font-weight:700; }
  button:disabled { opacity:.5; cursor:default; }
  .badge { font-size:10px; background:#eef2f4; border-radius:4px; padding:1px 5px; color:var(--muted); }
  #status, #progress { font-size:12px; color:var(--muted); }
  #main { flex:1; display:flex; min-height:0; }
  #map { flex:1; min-width:0; background:#e8eef0; }
  #review { width:380px; max-width:42vw; flex-shrink:0; border-left:1px solid var(--border); background:#fff; overflow-y:auto; padding:14px; }
  @media (max-width:760px){ #main{flex-direction:column} #review{width:auto;max-width:none;border-left:0;border-top:1px solid var(--border);max-height:55%} #map{flex:1} }
  .placeholder { color:var(--muted); font-size:14px; text-align:center; margin-top:40px; line-height:1.6; }
  .rv-num { display:inline-flex; align-items:center; justify-content:center; background:var(--navy); color:#fff; border-radius:50%; width:22px; height:22px; font-size:12px; }
  .rv-title { font-weight:700; font-size:15px; margin:8px 0 2px; }
  .rv-meta { font-size:12px; color:var(--muted); margin-bottom:10px; }
  .rv-status { font-size:11px; font-weight:700; }
  .rv-status.kept { color:var(--teal); }
  .rv-status.dropped { color:var(--red); }
  .thumb { width:100%; aspect-ratio:16/10; object-fit:cover; background:#dde3e8; border-radius:8px; display:block; cursor:pointer; }
  iframe { width:100%; aspect-ratio:16/9; border:0; border-radius:8px; margin-top:8px; }
  .rv-links { font-size:13px; margin:10px 0; }
  a { color:var(--teal); font-weight:600; text-decoration:none; }
  a:hover { text-decoration:underline; }
  .note { width:100%; font-size:13px; padding:7px 9px; border:1px solid var(--border); border-radius:7px; margin:8px 0; }
  .rv-actions { display:flex; gap:8px; margin-top:8px; }
  .rv-actions button { flex:1; padding:10px; }
  .rv-nav { display:flex; justify-content:space-between; margin-top:14px; }
  .rv-nav button { padding:6px 10px; }
  .hint { font-size:11px; color:var(--muted); margin-top:6px; }
  #add-btn.on { background:var(--navy); color:#fff; border-color:var(--navy); }
  .src { font-size:10px; font-weight:700; padding:1px 6px; border-radius:4px; color:#fff; }
  .src.windy { background:#2563eb; } .src.youtube { background:#c0392b; } .src.manual { background:#7c3aed; }
  .del { color:var(--red); font-size:12px; }
</style>
</head>
<body>
<header>
  <h1>📷 Webcams testen</h1>
  <span class="badge" id="race-badge">tourdivide26</span>
  <span id="status">laden…</span>
  <span id="progress"></span>
  <span class="sp"></span>
  <label style="font-size:12px;color:var(--muted)">vanaf km <input id="fromkm" type="number" min="0" step="10" value="850" style="width:72px;padding:5px 6px;border:1px solid var(--border);border-radius:6px" oninput="setFromKm(this.value)"></label>
  <button onclick="fromLeader()" title="Zet de ondergrens op de huidige koppositie">📍 leider</button>
  <button id="add-btn" onclick="toggleAddMode()">➕ Toevoegen</button>
  <button onclick="scan(true)">↻ Herscan</button>
  <button class="primary" id="save-btn" onclick="save()" disabled>Opslaan op kaart (0)</button>
</header>
<div id="main">
  <div id="map"></div>
  <div id="review"><div class="placeholder">Bezig met scannen langs de route…</div></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const API  = 'https://tracker.klikschaak.nl';
const RACE = 'tourdivide26';
const SLUG = 'tour-divide-2026';
let allCams = [];              // alle gevonden cams
let cams = [];                 // zichtbaar (gefilterd op km ≥ fromKm)
let fromKm = 850;              // cams vóór dit punt zijn niet meer relevant (renners voorbij)
const selected  = new Set();   // nuttig → op kaart
const dropped   = new Set();   // weggegooid
const notes = {};
let map, markers = {}, curIdx = -1;

const COL = { kept:'#14b8a6', dropped:'#9aa3ad', todo:'#2563eb' };
function statusOf(id) { return selected.has(id) ? 'kept' : dropped.has(id) ? 'dropped' : 'todo'; }
function setStatus(t) { document.getElementById('status').textContent = t; }
function esc(s){ return (s||'').toString().replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }

function updateProgress() {
  const done = cams.filter(c => statusOf(c.id) !== 'todo').length;
  document.getElementById('progress').textContent = cams.length ? `${done}/${cams.length} beoordeeld (vanaf km ${fromKm}) · ${selected.size} op kaart` : '';
  const b = document.getElementById('save-btn');
  b.textContent = `Opslaan op kaart (${selected.size})`;
  b.disabled = false;
}

// pas het km-filter toe op de volledige lijst → zichtbare cams + markers + review
function applyFilter() {
  cams = allCams.filter(c => (c.routeKm || 0) >= fromKm);
  curIdx = -1;
  placeMarkers();
  renderReview();
  updateProgress();
}
function setFromKm(v) { fromKm = parseFloat(v) || 0; applyFilter(); }
async function fromLeader() {
  try {
    const riders = await (await fetch(`${API}/api/fmc/${RACE}/positions`)).json();
    const lead = Math.max(0, ...(Array.isArray(riders) ? riders : []).filter(x => !x.scratched).map(x => x.distanceOnTrack || 0));
    if (lead > 0) { fromKm = Math.floor(lead / 10) * 10; document.getElementById('fromkm').value = fromKm; applyFilter(); setStatus(`ondergrens op koppositie: km ${fromKm}`); }
  } catch(e) { setStatus('⚠ kon koppositie niet ophalen: ' + e.message); }
}

async function initMap() {
  map = L.map('map').setView([45, -110], 4);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom:19, attribution:'© OpenStreetMap' }).addTo(map);
  map.on('click', onMapClick);
  try {
    const r = await fetch(`${API}/${SLUG}/route.json`);
    if (r.ok) { const pts = await r.json(); const line = L.polyline(pts,{color:'#b90a0a',weight:3,opacity:.85}).addTo(map); map.fitBounds(line.getBounds(),{padding:[20,20]}); }
  } catch(e) {}
}

async function scan(fresh) {
  setStatus('scannen…');
  document.getElementById('review').innerHTML = '<div class="placeholder">Bezig met scannen langs de route… (kan even duren)</div>';
  try {
    const cr = await fetch(`${API}/api/webcams/curated?race=${RACE}`);
    (await cr.json()).webcams?.forEach(w => { selected.add(w.id); if (w.note) notes[w.id] = w.note; });
  } catch(e) {}
  try {
    const r = await fetch(`${API}/api/webcams/route?race=${RACE}${fresh ? '&fresh=1' : ''}`);
    const j = await r.json();
    if (j.enabled === false) { setStatus('⚠ Geen WINDY_API_KEY ingesteld op de server.'); renderReview(); return; }
    if (j.error) setStatus('⚠ ' + j.error);
    allCams = j.webcams || [];
    setStatus(`${allCams.length} cams gevonden${j.cached ? ' (cache)' : ''}`);
    applyFilter();
  } catch(e) { setStatus('⚠ ' + e.message); }
}

function placeMarkers() {
  Object.values(markers).forEach(m => m.remove()); markers = {};
  cams.forEach((c, i) => {
    if (c.lat == null || c.lon == null) return;
    const m = L.circleMarker([c.lat, c.lon], markerStyle(c.id, false)).addTo(map);
    m.bindTooltip(`${i+1}. ${c.title}`);
    m.on('click', () => openReview(i));
    markers[c.id] = m;
  });
}
function markerStyle(id, current) {
  const col = COL[statusOf(id)];
  return { radius: current ? 9 : 6, color: current ? '#ffbc00' : '#fff', weight: current ? 3 : 1.5, fillColor: col, fillOpacity: 1 };
}
function refreshMarker(id, current) { if (markers[id]) markers[id].setStyle(markerStyle(id, current)); }

function openReview(i) {
  if (i < 0 || i >= cams.length) return;
  if (curIdx >= 0 && cams[curIdx]) refreshMarker(cams[curIdx].id, false);
  curIdx = i;
  const c = cams[i];
  refreshMarker(c.id, true);
  if (c.lat != null && c.lon != null) map.panTo([c.lat, c.lon]);
  renderReview();
}

function renderReview() {
  const el = document.getElementById('review');
  if (curIdx < 0 || !cams[curIdx]) {
    el.innerHTML = cams.length
      ? `<div class="placeholder">Klik op een 📍 op de kaart om een cam te beoordelen,<br>of begin bij de eerste.<br><br><button class="primary" onclick="openReview(0)">Begin bij cam 1 ▶</button></div>`
      : `<div class="placeholder">Geen cams gevonden.</div>`;
    return;
  }
  const c = cams[curIdx];
  const loc = [c.city, c.region, c.country].filter(Boolean).join(', ');
  const st = statusOf(c.id);
  const stTxt = st === 'kept' ? '<span class="rv-status kept">✓ op kaart</span>' : st === 'dropped' ? '<span class="rv-status dropped">✕ weggegooid</span>' : '';
  const srcLbl = { windy:'Windy', youtube:'YouTube', manual:'handmatig' }[c.source] || c.source || '';
  el.innerHTML = `
    <div><span class="rv-num">${curIdx+1}</span> <span style="font-size:11px;color:var(--muted)">van ${cams.length}</span>
      ${srcLbl ? `<span class="src ${c.source}">${srcLbl}</span>` : ''} &nbsp; ${stTxt}</div>
    <div class="rv-title">${esc(c.title)}</div>
    <div class="rv-meta">${esc(loc)}<br>km ${c.routeKm} langs route · ${c.distKm} km van de route${c.status && c.status!=='active' ? ` · <b style="color:var(--red)">${esc(c.status)}</b>` : ''}
      ${c.source==='manual' ? ` · <a class="del" href="#" onclick="return delManual('${c.id}')">verwijder</a>` : ''}</div>
    <img class="thumb" src="${c.preview || c.thumbnail || ''}" alt="" onerror="this.style.opacity=.3" title="${c.playerDay ? 'klik = live embed' : 'klik = open live ↗'}" onclick="${c.playerDay ? `embedHere(this)` : `window.open('${c.detailUrl}','_blank')`}">
    <div class="rv-links">
      ${c.detailUrl ? `<a href="${c.detailUrl}" target="_blank" rel="noopener">▶ live bekijken ↗</a>` : ''}
    </div>
    <input class="note" placeholder="notitie (bijv. 'toont trail bij brug')" value="${esc(notes[c.id]||'')}" oninput="notes[${jid(c.id)}]=this.value">
    <div class="rv-actions">
      <button class="keep" onclick="keep()">✓ Nuttig</button>
      <button class="drop" onclick="drop()">✕ Weggooien</button>
    </div>
    <div class="hint">Sneltoetsen: ← → bladeren · J = nuttig · K = weggooien</div>
    <div class="rv-nav">
      <button onclick="openReview(curIdx-1)" ${curIdx===0?'disabled':''}>◀ vorige</button>
      <button onclick="nextTodo()">volgende onbeoordeeld ⏭</button>
      <button onclick="openReview(curIdx+1)" ${curIdx===cams.length-1?'disabled':''}>volgende ▶</button>
    </div>`;
}

function embedHere(img) {
  const c = cams[curIdx]; if (!c || !c.playerDay) return;
  const f = document.createElement('iframe'); f.src = c.playerDay; f.allow = 'autoplay; fullscreen';
  img.replaceWith(f);
}
function jid(id){ return typeof id === 'number' ? id : JSON.stringify(id); }

function keep() { const c = cams[curIdx]; if(!c) return; selected.add(c.id); dropped.delete(c.id); after(c.id); }
function drop() { const c = cams[curIdx]; if(!c) return; dropped.add(c.id); selected.delete(c.id); after(c.id); }
function after(id) { refreshMarker(id, false); updateProgress(); nextTodo(); }
function nextTodo() {
  for (let k = 1; k <= cams.length; k++) {
    const i = (curIdx + k) % cams.length;
    if (statusOf(cams[i].id) === 'todo') { openReview(i); return; }
  }
  // niets meer onbeoordeeld
  refreshMarker(cams[curIdx].id, true);
  setStatus(`klaar — ${selected.size} cams geselecteerd. Klik "Opslaan op kaart".`);
}

document.addEventListener('keydown', e => {
  if (curIdx < 0 || ['INPUT','TEXTAREA'].includes(e.target.tagName)) return;
  if (e.key === 'ArrowRight') openReview(Math.min(curIdx+1, cams.length-1));
  else if (e.key === 'ArrowLeft') openReview(Math.max(curIdx-1, 0));
  else if (e.key.toLowerCase() === 'j') keep();
  else if (e.key.toLowerCase() === 'k') drop();
});

// ── Handmatig toevoegen (Ovando nest-cam, DOT-pas-cam, directory-cam) ──
let addMode = false;
function toggleAddMode() {
  addMode = !addMode;
  document.getElementById('add-btn').classList.toggle('on', addMode);
  map.getContainer().style.cursor = addMode ? 'crosshair' : '';
  setStatus(addMode ? '➕ Klik op de kaart waar de cam staat…' : '');
}
async function onMapClick(e) {
  if (!addMode) return;
  const title = prompt('Naam van de cam (bijv. "Ovando nest-cam"):');
  if (!title) { toggleAddMode(); return; }
  const url = prompt('URL van de livestream/pagina (optioneel):', '') || '';
  setStatus('toevoegen…');
  try {
    const r = await fetch(`${API}/api/webcams/manual?race=${RACE}`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ title, url, lat: e.latlng.lat, lon: e.latlng.lng })
    });
    const j = await r.json();
    if (j.error) { setStatus('⚠ ' + j.error); toggleAddMode(); return; }
    allCams.push(j.added);
    allCams.sort((a,b)=>(a.routeKm||0)-(b.routeKm||0));
    selected.add(j.added.id);            // handmatig toegevoegd = meteen op kaart
    applyFilter();
    const i = cams.findIndex(c => c.id === j.added.id);
    if (i >= 0) openReview(i);
    setStatus('✓ toegevoegd en aangevinkt — klik straks "Opslaan op kaart"');
  } catch(err) { setStatus('⚠ ' + err.message); }
  toggleAddMode();
}
async function delManual(id) {
  if (!confirm('Deze handmatige cam verwijderen?')) return false;
  try {
    await fetch(`${API}/api/webcams/manual?race=${RACE}&id=${encodeURIComponent(id)}`, { method:'DELETE' });
    selected.delete(id); dropped.delete(id);
    const ai = allCams.findIndex(c => c.id === id);
    if (ai >= 0) allCams.splice(ai, 1);
    applyFilter();
  } catch(e) { setStatus('⚠ ' + e.message); }
  return false;
}

async function save() {
  const payload = [...selected].map(id => {
    const c = allCams.find(x => x.id === id) || { id };
    return { id, source:c.source, title:c.title, lat:c.lat, lon:c.lon, city:c.city, region:c.region, country:c.country,
      thumbnail:c.thumbnail, detailUrl:c.detailUrl, playerDay:c.playerDay, note:notes[id]||'' };
  });
  setStatus('opslaan…');
  try {
    const r = await fetch(`${API}/api/webcams/curated?race=${RACE}`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
    const j = await r.json();
    setStatus(j.error ? '⚠ ' + j.error : `✓ ${j.saved} cams opgeslagen — staan nu op de kaart`);
  } catch(e) { setStatus('⚠ ' + e.message); }
}

initMap().then(() => scan(false));
</script>
</body>
</html>
