<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Webcams testen — Tour Divide</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  :root { --teal:#14b8a6; --navy:#1c2635; --border:#dfe5ea; --muted:#6b7280; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system,Segoe UI,Roboto,sans-serif; color:var(--navy); background:#f3f5f7; }
  header { position:sticky; top:0; z-index:10; background:#fff; border-bottom:1px solid var(--border);
    padding:10px 16px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  header h1 { font-size:16px; margin:0; }
  header .sp { flex:1; }
  button { font-size:13px; padding:7px 12px; border-radius:7px; border:1px solid var(--border);
    background:#fff; cursor:pointer; }
  button.primary { background:var(--teal); color:#fff; border-color:var(--teal); font-weight:700; }
  button:disabled { opacity:.5; cursor:default; }
  #status { font-size:12px; color:var(--muted); }
  #map { height:300px; border-bottom:1px solid var(--border); background:#e8eef0; }
  #list { padding:12px; display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:12px; max-width:1400px; margin:0 auto; }
  .card { background:#fff; border:1px solid var(--border); border-radius:10px; overflow:hidden; display:flex; flex-direction:column; }
  .card.sel { outline:2px solid var(--teal); }
  .card.hl { box-shadow:0 0 0 3px rgba(20,184,166,.4); }
  .thumb { width:100%; aspect-ratio:16/10; object-fit:cover; background:#dde3e8; display:block; }
  .card-body { padding:8px 10px; display:flex; flex-direction:column; gap:6px; }
  .card-title { font-weight:700; font-size:13px; display:flex; gap:6px; align-items:baseline; }
  .card-title .num { background:var(--navy); color:#fff; border-radius:50%; min-width:18px; height:18px;
    font-size:11px; display:inline-flex; align-items:center; justify-content:center; flex-shrink:0; }
  .meta { font-size:11px; color:var(--muted); }
  .row { display:flex; align-items:center; gap:8px; font-size:12px; }
  .row label { display:flex; align-items:center; gap:5px; cursor:pointer; font-weight:600; }
  .note { width:100%; font-size:12px; padding:5px 7px; border:1px solid var(--border); border-radius:6px; }
  a { color:var(--teal); font-weight:600; text-decoration:none; }
  a:hover { text-decoration:underline; }
  iframe { width:100%; aspect-ratio:16/9; border:0; border-top:1px solid var(--border); }
  .empty { padding:40px; text-align:center; color:var(--muted); grid-column:1/-1; }
  .badge { font-size:10px; background:#eef2f4; border-radius:4px; padding:1px 5px; color:var(--muted); }
  .status-inactive { color:#c0392b; }
</style>
</head>
<body>
<header>
  <h1>📷 Webcams testen</h1>
  <span class="badge" id="race-badge">tourdivide26</span>
  <span id="status">laden…</span>
  <span class="sp"></span>
  <button onclick="scan(true)">↻ Herscan</button>
  <button class="primary" id="save-btn" onclick="save()" disabled>Opslaan op kaart (0)</button>
</header>
<div id="map"></div>
<div id="list"><div class="empty">Bezig met scannen langs de route…</div></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const API  = 'https://tracker.klikschaak.nl';
const RACE = 'tourdivide26';
const SLUG = 'tour-divide-2026';
let cams = [];
const selected = new Set();   // ids op de kaart
const notes = {};             // id → note
let map, markers = {};

function setStatus(t) { document.getElementById('status').textContent = t; }
function updateSaveBtn() {
  const b = document.getElementById('save-btn');
  b.textContent = `Opslaan op kaart (${selected.size})`;
  b.disabled = false;
}

async function initMap() {
  map = L.map('map').setView([45, -110], 4);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '© OpenStreetMap' }).addTo(map);
  try {
    const r = await fetch(`${API}/${SLUG}/route.json`);
    if (r.ok) {
      const pts = await r.json();
      const line = L.polyline(pts, { color: '#b90a0a', weight: 3, opacity: .85 }).addTo(map);
      map.fitBounds(line.getBounds(), { padding: [20, 20] });
    }
  } catch(e) {}
}

async function scan(fresh) {
  setStatus('scannen…');
  document.getElementById('list').innerHTML = '<div class="empty">Bezig met scannen langs de route… (kan even duren)</div>';
  // bestaande selectie ophalen om vooraf aan te vinken
  try {
    const cr = await fetch(`${API}/api/webcams/curated?race=${RACE}`);
    const cj = await cr.json();
    (cj.webcams || []).forEach(w => { selected.add(w.id); if (w.note) notes[w.id] = w.note; });
  } catch(e) {}
  try {
    const r = await fetch(`${API}/api/webcams/route?race=${RACE}${fresh ? '&fresh=1' : ''}`);
    const j = await r.json();
    if (j.enabled === false) { setStatus('⚠ Geen WINDY_API_KEY ingesteld op de server.'); render(); return; }
    if (j.error) { setStatus('⚠ ' + j.error); }
    cams = j.webcams || [];
    setStatus(`${cams.length} cams gevonden langs de route${j.cached ? ' (cache)' : ''}`);
    render();
  } catch(e) { setStatus('⚠ ' + e.message); }
}

function render() {
  const list = document.getElementById('list');
  Object.values(markers).forEach(m => m.remove()); markers = {};
  if (!cams.length) { list.innerHTML = '<div class="empty">Geen cams gevonden.</div>'; updateSaveBtn(); return; }
  list.innerHTML = '';
  cams.forEach((c, i) => {
    const n = i + 1;
    // marker
    if (c.lat != null && c.lon != null) {
      const mk = L.marker([c.lat, c.lon]).addTo(map).bindTooltip(`${n}. ${c.title}`);
      mk.on('click', () => { const el = document.getElementById('card-' + c.id); if (el) { el.scrollIntoView({ behavior:'smooth', block:'center' }); flash(el); } });
      markers[c.id] = mk;
    }
    // card
    const card = document.createElement('div');
    card.className = 'card' + (selected.has(c.id) ? ' sel' : '');
    card.id = 'card-' + c.id;
    const loc = [c.city, c.region, c.country].filter(Boolean).join(', ');
    card.innerHTML = `
      <img class="thumb" src="${c.preview || c.thumbnail || ''}" loading="lazy" alt="" onerror="this.style.opacity=.3">
      <div class="card-body">
        <div class="card-title"><span class="num">${n}</span><span>${esc(c.title)}</span>
          ${c.status && c.status !== 'active' ? `<span class="status-inactive">(${esc(c.status)})</span>` : ''}</div>
        <div class="meta">${esc(loc)} · km ${c.routeKm} langs route · ${c.distKm} km van route</div>
        <div class="row">
          <label><input type="checkbox" ${selected.has(c.id) ? 'checked' : ''} onchange="toggle(${jsId(c.id)}, this)"> op kaart</label>
          ${c.detailUrl ? `<a href="${c.detailUrl}" target="_blank" rel="noopener">▶ live bekijken ↗</a>` : ''}
          ${c.playerDay ? `<a href="#" onclick="return embed(this, ${jsId(c.id)})">embed</a>` : ''}
        </div>
        <input class="note" placeholder="notitie (bijv. 'toont trail bij brug')" value="${esc(notes[c.id] || '')}" oninput="notes[${jsId(c.id)}]=this.value">
      </div>`;
    list.appendChild(card);
  });
  updateSaveBtn();
}

function camById(id) { return cams.find(c => c.id === id); }
function jsId(id) { return typeof id === 'number' ? id : JSON.stringify(id); }
function esc(s) { return (s || '').toString().replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }
function flash(el) { el.classList.add('hl'); setTimeout(() => el.classList.remove('hl'), 1500); }

function toggle(id, cb) {
  if (cb.checked) selected.add(id); else selected.delete(id);
  const card = document.getElementById('card-' + id);
  if (card) card.classList.toggle('sel', cb.checked);
  updateSaveBtn();
}

function embed(a, id) {
  const c = camById(id); if (!c || !c.playerDay) return false;
  if (a.nextElementSibling && a.nextElementSibling.tagName === 'IFRAME') { a.nextElementSibling.remove(); return false; }
  const f = document.createElement('iframe');
  f.src = c.playerDay; f.allow = 'autoplay; fullscreen';
  a.closest('.card-body').appendChild(f);
  return false;
}

async function save() {
  const payload = cams.filter(c => selected.has(c.id)).map(c => ({
    id: c.id, title: c.title, lat: c.lat, lon: c.lon, city: c.city, region: c.region,
    detailUrl: c.detailUrl, note: notes[c.id] || ''
  }));
  // ook al-eerder geselecteerde cams die niet in deze scan zitten, behouden
  const inScan = new Set(cams.map(c => c.id));
  selected.forEach(id => { if (!inScan.has(id)) payload.push({ id, note: notes[id] || '' }); });
  setStatus('opslaan…');
  try {
    const r = await fetch(`${API}/api/webcams/curated?race=${RACE}`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
    });
    const j = await r.json();
    if (j.error) setStatus('⚠ ' + j.error);
    else setStatus(`✓ ${j.saved} cams opgeslagen — staan nu op de kaart`);
  } catch(e) { setStatus('⚠ ' + e.message); }
}

initMap().then(() => scan(false));
</script>
</body>
</html>
