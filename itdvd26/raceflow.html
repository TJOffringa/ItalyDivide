<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Italy Divide – Race Flow</title>
  <style>
    :root { --bg:#09090f; --surface:#1a1d27; --border:#2a2d3a; --text:#e8e9ed; --muted:#6b7280; --accent:#4ade80; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:system-ui,-apple-system,sans-serif; font-size:14px; min-height:100dvh; display:flex; flex-direction:column; }

    #header { background:var(--surface); border-bottom:1px solid var(--border); padding:10px 16px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; gap:12px; }
    #header h1 { font-size:15px; font-weight:700; color:var(--accent); }
    #back-link { font-size:12px; color:var(--muted); text-decoration:none; white-space:nowrap; }
    #back-link:hover { color:var(--text); }

    #count-toggle { display:flex; gap:4px; }
    .cnt-btn {
      background:none; border:1px solid var(--border); color:var(--muted);
      font-size:11px; padding:3px 10px; border-radius:4px; cursor:pointer; font-family:inherit;
      transition: color .1s, border-color .1s, background .1s;
    }
    .cnt-btn:hover { color:var(--text); border-color:var(--muted); }
    .cnt-btn.active { background:var(--accent); color:#09090f; border-color:var(--accent); font-weight:700; }

    #chart-wrap { flex:1; padding:12px 16px 4px; display:flex; align-items:center; justify-content:center; }
    #chart { width:100%; height:auto; display:block; max-height:calc(100dvh - 96px); }

    #footer { padding:6px 16px 10px; font-size:11px; color:var(--muted); display:flex; align-items:center; gap:12px; flex-shrink:0; }
    #refresh-btn { background:none; border:1px solid var(--border); color:var(--muted); font-size:11px; padding:3px 8px; border-radius:4px; cursor:pointer; font-family:inherit; }
    #refresh-btn:hover { color:var(--text); border-color:var(--muted); }
  </style>
</head>
<body>

<div id="header">
  <h1>📊 Italy Divide — Race Flow</h1>
  <div id="count-toggle">
    <button class="cnt-btn" data-n="5"  onclick="setCount(5)">Top 5</button>
    <button class="cnt-btn" data-n="10" onclick="setCount(10)">Top 10</button>
    <button class="cnt-btn" data-n="20" onclick="setCount(20)">Top 20</button>
  </div>
  <a id="back-link" href="index.html">← Tracker</a>
</div>

<div id="chart-wrap">
  <svg id="chart" viewBox="0 0 980 540" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet"></svg>
</div>

<div id="footer">
  <span id="status">Laden…</span>
  <button id="refresh-btn" onclick="load()">↺ Ververs</button>
  <span id="countdown" style="margin-left:auto"></span>
</div>

<script>
'use strict';
const API_BASE = 'https://tracker.klikschaak.nl';

const COLORS = [
  '#f59e0b','#38bdf8','#f87171','#4ade80','#a78bfa',
  '#fb923c','#34d399','#60a5fa','#f472b6','#fbbf24',
  '#a3e635','#e879f9','#2dd4bf','#818cf8','#fb7185',
  '#facc15','#67e8f9','#86efac','#c084fc','#fdba74',
];

const W = 980, H = 540;
const P = { t:30, r:60, b:52, l:66 };
const CW = W - P.l - P.r;
const CH = H - P.t - P.b;

let cdTimer;
let activeCount = parseInt(localStorage.getItem('rf_count') || '5');

function setCount(n) {
  activeCount = n;
  localStorage.setItem('rf_count', n);
  document.querySelectorAll('.cnt-btn').forEach(b => b.classList.toggle('active', +b.dataset.n === n));
  load();
}

function initToggle() {
  document.querySelectorAll('.cnt-btn').forEach(b => b.classList.toggle('active', +b.dataset.n === activeCount));
}

async function load() {
  clearInterval(cdTimer);
  document.getElementById('countdown').textContent = '';
  document.getElementById('status').textContent = '⏳ Laden…';
  try {
    const res = await fetch(`${API_BASE}/api/raceflow?count=${activeCount}&_=` + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    draw(data);
    document.getElementById('status').textContent =
      `Top ${data.riders.length} rijders · ${new Date().toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'})}`;
    let s = 900;
    cdTimer = setInterval(() => {
      --s;
      const m = Math.floor(s / 60), sec = s % 60;
      document.getElementById('countdown').textContent = `↺ ${m}:${String(sec).padStart(2,'0')}`;
      if (s <= 0) { clearInterval(cdTimer); load(); }
    }, 1000);
  } catch(e) {
    document.getElementById('status').textContent = 'Fout: ' + e.message;
  }
}

function draw({ riders, totalKm, raceStart }) {
  const svg  = document.getElementById('chart');
  const now  = Date.now();
  const allPts = riders.flatMap(r => r.pts);
  if (!allPts.length) { svg.innerHTML = ''; return; }

  const maxHrs = Math.ceil((now - raceStart) / 3600000) + 1;
  const kmTop  = Math.ceil((totalKm || Math.max(...allPts.map(p => p[1]))) / 200) * 200;

  const sx  = hrs => P.l + (hrs / maxHrs) * CW;
  const sy  = km  => P.t + CH - (km / kmTop) * CH;
  const tHr = t   => (t - raceStart) / 3600000;

  // Legend: 1 column for ≤10 riders, 2 columns for >10
  const twoCol  = riders.length > 10;
  const LH      = twoCol ? 13 : 16;
  const colW    = 175;
  const cols    = twoCol ? 2 : 1;
  const rows    = Math.ceil(riders.length / cols);
  const LX      = P.l + 12;
  const LY      = P.t + 12;
  const LW      = cols * colW + 4;
  const LBoxH   = rows * LH + 10;

  let h = '';

  // ── Backgrounds ──────────────────────────────────────────────────
  h += `<rect width="${W}" height="${H}" fill="#09090f"/>`;
  h += `<rect x="${P.l}" y="${P.t}" width="${CW}" height="${CH}" fill="#0c0e16"/>`;

  // ── Night bands ───────────────────────────────────────────────────
  for (let day = -1; day <= Math.ceil(maxHrs / 24) + 1; day++) {
    const base = new Date(raceStart + day * 86400000);
    base.setHours(0, 0, 0, 0);
    const nightS = new Date(base); nightS.setHours(20, 0, 0, 0);
    const nightE = new Date(base.getTime() + 86400000); nightE.setHours(7, 0, 0, 0);
    const hs = tHr(nightS.getTime()), he = tHr(nightE.getTime());
    if (he < 0 || hs > maxHrs) continue;
    const x0 = sx(Math.max(hs, 0)), x1 = sx(Math.min(he, maxHrs));
    if (x1 > x0)
      h += `<rect x="${x0.toFixed(1)}" y="${P.t}" width="${(x1-x0).toFixed(1)}" height="${CH}" fill="rgba(255,255,255,.025)"/>`;
  }

  // ── Y grid ────────────────────────────────────────────────────────
  const kmStep = kmTop <= 800 ? 100 : 200;
  for (let km = 0; km <= kmTop; km += kmStep) {
    const y = sy(km).toFixed(1);
    h += `<line x1="${P.l}" y1="${y}" x2="${P.l+CW}" y2="${y}" stroke="#161820" stroke-width="1"/>`;
    h += `<text x="${P.l-8}" y="${+y+4}" text-anchor="end" fill="#4b5563" font-size="10" font-family="system-ui,sans-serif">${km} km</text>`;
  }

  // ── X grid ────────────────────────────────────────────────────────
  const hrStep = maxHrs <= 48 ? 6 : maxHrs <= 120 ? 12 : 24;
  for (let hr = 0; hr <= maxHrs; hr += hrStep) {
    const x = sx(hr).toFixed(1);
    h += `<line x1="${x}" y1="${P.t}" x2="${x}" y2="${P.t+CH}" stroke="#161820" stroke-width="1"/>`;
    h += `<text x="${x}" y="${P.t+CH+16}" text-anchor="middle" fill="#4b5563" font-size="10" font-family="system-ui,sans-serif">${hr}u</text>`;
  }

  // ── Axes & labels ─────────────────────────────────────────────────
  h += `<rect x="${P.l}" y="${P.t}" width="${CW}" height="${CH}" fill="none" stroke="#2a2d3a" stroke-width="1"/>`;
  h += `<text x="${P.l+CW/2}" y="${H-4}" text-anchor="middle" fill="#4b5563" font-size="10" font-family="system-ui,sans-serif">Uren na start</text>`;
  h += `<text x="${P.l-48}" y="${P.t+CH/2}" text-anchor="middle" fill="#4b5563" font-size="10" font-family="system-ui,sans-serif" transform="rotate(-90,${P.l-48},${P.t+CH/2})">Afstand (km)</text>`;

  // ── FINISH marker ─────────────────────────────────────────────────
  const fy = sy(totalKm).toFixed(1);
  h += `<line x1="${P.l}" y1="${fy}" x2="${P.l+CW}" y2="${fy}" stroke="#374151" stroke-dasharray="4 4" stroke-width="1"/>`;
  h += `<text x="${P.l+CW+6}" y="${+fy+4}" fill="#6b7280" font-size="10" font-weight="600" font-family="system-ui,sans-serif">FINISH</text>`;

  // ── "Nu" marker ───────────────────────────────────────────────────
  const nx = sx(tHr(now)).toFixed(1);
  h += `<line x1="${nx}" y1="${P.t}" x2="${nx}" y2="${P.t+CH}" stroke="#374151" stroke-dasharray="3 3" stroke-width="1"/>`;
  h += `<text x="${+nx-4}" y="${P.t+10}" text-anchor="end" fill="#4b5563" font-size="9" font-family="system-ui,sans-serif">nu</text>`;

  // ── Rider lines ───────────────────────────────────────────────────
  riders.forEach((rider, i) => {
    const color = COLORS[i % COLORS.length];
    if (!rider.pts.length) return;
    const coords = rider.pts
      .map(([t, km]) => `${sx(tHr(t)).toFixed(1)},${sy(km).toFixed(1)}`)
      .join(' ');
    const lw = twoCol ? 1.5 : 2;
    h += `<polyline points="${coords}" stroke="${color}" stroke-width="${lw}" fill="none" stroke-linejoin="round" stroke-linecap="round" opacity="0.85"/>`;
    const [lt, lkm] = rider.pts[rider.pts.length - 1];
    h += `<circle cx="${sx(tHr(lt)).toFixed(1)}" cy="${sy(lkm).toFixed(1)}" r="${twoCol ? 3 : 4}" fill="${color}" stroke="#09090f" stroke-width="1.5"/>`;
  });

  // ── Legend ────────────────────────────────────────────────────────
  h += `<rect x="${LX-6}" y="${LY-6}" width="${LW}" height="${LBoxH}" rx="4" fill="rgba(12,14,22,.88)" stroke="#2a2d3a" stroke-width="1"/>`;
  riders.forEach((rider, i) => {
    const color = COLORS[i % COLORS.length];
    const col   = twoCol ? (i < rows ? 0 : 1) : 0;
    const row   = twoCol ? (i < rows ? i : i - rows) : i;
    const lx    = LX + col * colW;
    const ly    = LY + row * LH + 4;
    const fs    = twoCol ? 10 : 11;
    h += `<rect x="${lx}" y="${ly-1}" width="12" height="7" rx="2" fill="${color}" opacity="0.9"/>`;
    h += `<text x="${lx+16}" y="${ly+5}" fill="${color}" font-size="${fs}" font-weight="600" font-family="system-ui,sans-serif">${i+1}. ${rider.name}</text>`;
  });

  svg.innerHTML = h;
}

initToggle();
load();
</script>
</body>
</html>
