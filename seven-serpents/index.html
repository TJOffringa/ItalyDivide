<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seven Serpents: Quick Bite! 2026 — Bomba Tracker</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root {
      --bg:      #0a0f1e;
      --surface: #111827;
      --surface2:#1a2235;
      --border:  #1e2d4a;
      --text:    #e8eaf0;
      --muted:   #6b7a99;
      --red:     #e8194c;
      --teal:    #00c4d4;
      --green:   #4ade80;
      --navy:    #1e3a6e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text);
      font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 14px; }

    #app { display: flex; height: 100dvh; flex-direction: column; }

    /* ── Header ── */
    #header {
      background: var(--navy);
      padding: 8px 14px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0; gap: 10px; min-height: 48px;
    }
    #hdr-left  { display: flex; align-items: center; gap: 10px; min-width: 0; }
    #hdr-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    #back { font-size: 11px; color: rgba(255,255,255,.55); text-decoration: none; white-space: nowrap; }
    #back:hover { color: #fff; }
    #race-title { font-size: 14px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #live-badge {
      font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; flex-shrink: 0;
      background: rgba(232,25,76,.25); color: #ff6b8a; border: 1px solid rgba(232,25,76,.4);
      display: flex; align-items: center; gap: 4px;
    }
    .pulse { width: 6px; height: 6px; border-radius: 50%; background: var(--red); animation: pulse 1.4s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }
    #status-txt { font-size: 11px; color: rgba(255,255,255,.5); }
    #sidebar-toggle {
      background: none; border: 1px solid rgba(255,255,255,.2); color: rgba(255,255,255,.7);
      font-size: 11px; padding: 4px 8px; border-radius: 6px; cursor: pointer;
    }
    #sidebar-toggle:hover { color: #fff; border-color: rgba(255,255,255,.5); }

    /* ── Body ── */
    #body { display: flex; flex: 1; min-height: 0; }

    /* ── Sidebar ── */
    #sidebar {
      width: 280px; flex-shrink: 0; background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
      transition: width .2s ease;
    }
    #sidebar.collapsed { width: 0; border-right: none; }
    @media (max-width: 640px) {
      #sidebar { position: absolute; top: 48px; left: 0; bottom: 0; z-index: 500; width: 50vw; max-width: 260px; }
      #sidebar.collapsed { width: 0; }
    }

    /* ── Sidebar top stats ── */
    #sidebar-top { padding: 10px 12px 8px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    #stats-row { display: flex; gap: 6px; margin-bottom: 8px; }
    .stat-pill {
      font-size: 11px; padding: 2px 8px; border-radius: 12px;
      background: var(--surface2); border: 1px solid var(--border); color: var(--muted);
    }
    .stat-pill.active   { color: var(--green); border-color: rgba(74,222,128,.3); }
    .stat-pill.scratched { color: #f87171; border-color: rgba(248,113,113,.25); }

    /* ── Controls bar ── */
    #controls {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      display: flex; flex-wrap: wrap; gap: 6px;
      flex-shrink: 0;
    }
    .ctrl-btn {
      font-size: 11px; padding: 4px 10px; border-radius: 6px; cursor: pointer;
      background: var(--surface2); border: 1px solid var(--border); color: var(--muted);
      text-decoration: none; display: inline-flex; align-items: center; gap: 4px;
      transition: color .12s, border-color .12s, background .12s;
      white-space: nowrap;
    }
    .ctrl-btn:hover { color: var(--text); border-color: var(--muted); }
    .ctrl-btn.active { background: var(--teal); color: #0a0f1e; border-color: var(--teal); font-weight: 600; }
    .ctrl-btn.disabled { opacity: .4; cursor: not-allowed; pointer-events: none; }
    .ctrl-btn.mcd { border-color: rgba(255,188,0,.3); color: #ffbc00; }
    .ctrl-btn.mcd:hover { background: rgba(255,188,0,.1); border-color: #ffbc00; }

    /* ── Search ── */
    #search-wrap { padding: 8px 12px 6px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    #search { width: 100%; padding: 6px 10px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 12px; }
    #search:focus { outline: none; border-color: var(--teal); }
    #search::placeholder { color: var(--muted); }

    /* ── Rider list ── */
    #rider-list { flex: 1; overflow-y: auto; }
    .rider-row {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 12px; border-bottom: 1px solid rgba(30,45,74,.5);
      cursor: pointer; transition: background .1s;
    }
    .rider-row:hover { background: var(--surface2); }
    .rider-row.scratched-row { opacity: .4; }
    .r-rank    { font-size: 11px; color: var(--muted); width: 22px; text-align: right; flex-shrink: 0; }
    .r-dot     { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .r-name    { flex: 1; font-size: 12px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .r-km      { font-size: 11px; color: var(--muted); flex-shrink: 0; }
    .r-scratch { font-size: 10px; color: #f87171; flex-shrink: 0; }
    .r-fin     { font-size: 10px; font-weight: 700; color: var(--green); flex-shrink: 0; }

    /* ── Map ── */
    #map { flex: 1; min-width: 0; position: relative; }
    .leaflet-container { background: #0a0f1e; }

    #refresh-bar {
      position: absolute; bottom: 10px; right: 10px; z-index: 800;
      background: rgba(10,15,30,.8); border: 1px solid var(--border);
      border-radius: 6px; padding: 4px 10px; font-size: 11px; color: var(--muted);
      pointer-events: none;
    }

    /* ── Rider name labels ── */
    .rider-label {
      background: none !important; border: none !important; box-shadow: none !important;
      padding: 0 !important;
    }
    .rider-label::before { display: none !important; }
    .rl-inner {
      font-size: 10px; font-weight: 600; color: #fff;
      text-shadow: 0 0 3px #000, 0 0 3px #000;
      white-space: nowrap; pointer-events: none;
    }

    /* ── Overlay legend ── */
    #overlay-legend {
      display: none;
      position: absolute; bottom: 40px; left: 10px; z-index: 800;
      background: rgba(10,15,30,.88); border: 1px solid var(--border);
      border-radius: 6px; padding: 7px 10px; font-size: 10px;
      pointer-events: none; line-height: 1.6;
    }
    .leg-row { display: flex; align-items: center; gap: 5px; }
    .leg-swatch { width: 16px; height: 4px; border-radius: 2px; flex-shrink: 0; }

    /* ── Popups ── */
    .leaflet-popup-content-wrapper { background: #111827; border: 1px solid #1e2d4a; border-radius: 8px; color: #e8eaf0; box-shadow: 0 4px 20px rgba(0,0,0,.5); }
    .leaflet-popup-tip { background: #111827; }
    .leaflet-popup-content { margin: 10px 14px; font-size: 13px; }
    .pu-name { font-weight: 700; margin-bottom: 4px; }
    .pu-meta { font-size: 11px; color: #6b7a99; }
  </style>
</head>
<body>
<div id="app">

  <div id="header">
    <div id="hdr-left">
      <a id="back" href="../bomba/index.html">← Bomba</a>
      <div id="race-title">Seven Serpents: Quick Bite! 2026</div>
      <div id="live-badge"><span class="pulse"></span>Live</div>
    </div>
    <div id="hdr-right">
      <span id="status-txt">Loading…</span>
      <button id="sidebar-toggle" onclick="toggleSidebar()">☰ Klassement</button>
    </div>
  </div>

  <div id="body">
    <div id="sidebar">

      <div id="sidebar-top">
        <div id="stats-row">
          <span class="stat-pill active"    id="pill-active">— rijdend</span>
          <span class="stat-pill scratched" id="pill-scratch">— uitgevallen</span>
        </div>
      </div>

      <div id="controls">
        <a class="ctrl-btn" href="rider.html" title="Zoek faciliteiten langs de route">🔍 Langs route</a>
        <a class="ctrl-btn disabled" title="Race Flow: geen historische data beschikbaar voor deze race">📊 Race Flow</a>
        <button class="ctrl-btn" id="btn-helling" onclick="toggleGradient()" title="Kleur route op hellingshoek">⛰ Helling</button>
        <button class="ctrl-btn" id="btn-surface" onclick="toggleSurface()" title="Kleur route op ondergrond">🛣 Ondergrond</button>
      </div>

      <div id="search-wrap">
        <input id="search" type="text" placeholder="Zoek rijder…" oninput="filterList()">
      </div>

      <div id="rider-list"></div>
    </div>

    <div id="map">
      <div id="refresh-bar">↺ —</div>
      <div id="overlay-legend"></div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
'use strict';
const API      = 'https://tracker.klikschaak.nl';
const RC       = 'ss-qb26';
const RF       = 'ssqb26_v1_track.geojson';
const INTERVAL = 300;

let map, routeLayer;
let markerMap   = {};
let riders      = [];
let finishKm    = Infinity;
let sidebarOpen = window.innerWidth > 640;
let cdSecs = INTERVAL, cdTimer;

let routePts     = [];   // [[lat,lon], ...]
let routeCum     = [];   // cumulative km per point
let gradientLayer = null;
let surfaceLayer  = null;

// ── Map ────────────────────────────────────────────────────────────────
function initMap() {
  map = L.map('map', { zoomControl: false }).setView([46.05, 14.50], 7);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://openstreetmap.org/copyright">OpenStreetMap</a>', maxZoom: 19
  }).addTo(map);
  L.control.zoom({ position: 'bottomright' }).addTo(map);
  map.on('zoomend', updateLabelVisibility);
  document.getElementById('sidebar').classList.toggle('collapsed', !sidebarOpen);
  setTimeout(() => map.invalidateSize(), 250);
}

// ── Haversine ──────────────────────────────────────────────────────────
function hav([la1,lo1],[la2,lo2]) {
  const R = 6371, r = Math.PI/180;
  const a = Math.sin((la2-la1)*r/2)**2 + Math.cos(la1*r)*Math.cos(la2*r)*Math.sin((lo2-lo1)*r/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ── Route ──────────────────────────────────────────────────────────────
async function loadRoute() {
  try {
    const r = await fetch(`${API}/api/fmc/${RC}/route?f=${RF}`);
    const geojson = await r.json();
    if (routeLayer) routeLayer.remove();
    routeLayer = L.geoJSON(geojson, {
      style: { color: '#00c4d4', weight: 2, opacity: .6 },
      coordsToLatLng: c => L.latLng(parseFloat(c[1]), parseFloat(c[0]))
    }).addTo(map);

    // Build routePts for gradient/surface overlays
    const pts = [];
    for (const feat of (geojson.features || [])) {
      const geom = feat.geometry;
      const lines = geom.type === 'MultiLineString' ? geom.coordinates : [geom.coordinates];
      for (const line of lines)
        for (const c of line)
          pts.push([parseFloat(c[1]), parseFloat(c[0])]);
    }
    const step = Math.max(1, Math.floor(pts.length / 2000));
    routePts = pts.filter((_, i) => i % step === 0);
    routeCum = [0];
    for (let i = 1; i < routePts.length; i++)
      routeCum.push(routeCum[i-1] + hav(routePts[i-1], routePts[i]));
  } catch(e) { console.warn('Route load failed:', e.message); }
}

// ── Positions ──────────────────────────────────────────────────────────
async function loadPositions() {
  try {
    const r = await fetch(`${API}/api/fmc/${RC}/positions`);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    riders = await r.json();
    // Detect finish distance: most common max distanceOnTrack among non-scratched
    const dists = riders.filter(r => !r.scratched).map(r => r.distanceOnTrack || 0);
    finishKm = dists.length ? Math.max(...dists) : Infinity;
    renderMarkers();
    renderList();
    const finished  = riders.filter(r => !r.scratched && r.distanceOnTrack >= finishKm - 0.5).length;
    const active    = riders.filter(r => !r.scratched && r.distanceOnTrack  < finishKm - 0.5).length;
    const scratched = riders.filter(r =>  r.scratched).length;
    document.getElementById('pill-active').textContent  = `${finished} fin · ${active} rijdend`;
    document.getElementById('pill-scratch').textContent = `${scratched} DNF`;
    document.getElementById('status-txt').textContent   =
      `${riders.length} riders · ${new Date().toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'})}`;
  } catch(e) {
    document.getElementById('status-txt').textContent = 'Error: ' + e.message;
  }
}

// ── Markers ────────────────────────────────────────────────────────────
function renderMarkers() {
  const seen    = new Set();

  for (const rd of riders) {
    seen.add(rd.deviceId);
    const color   = rd.riderColor || '#888';
    const opacity = rd.scratched ? 0.3 : 0.9;

    if (markerMap[rd.deviceId]) {
      markerMap[rd.deviceId]
        .setLatLng([rd.latitude, rd.longitude])
        .setStyle({ color, fillColor: color, opacity, fillOpacity: opacity });
    } else {
      // First name only to keep labels short
      const firstName = rd.name.split(' ')[0];
      const m = L.circleMarker([rd.latitude, rd.longitude], {
        radius: rd.scratched ? 4 : 6, color, fillColor: color,
        fillOpacity: opacity, opacity, weight: 1.5
      }).addTo(map).bindPopup(() => popupHtml(rd));

      if (!rd.scratched) {
        m.bindTooltip(`<span class="rl-inner" style="color:${color}">${firstName}</span>`, {
          permanent: true, direction: 'right', offset: [7, 0],
          className: 'rider-label', opacity: 1
        });
      }
      markerMap[rd.deviceId] = m;
    }
  }
  for (const id of Object.keys(markerMap)) {
    if (!seen.has(+id)) { markerMap[id].remove(); delete markerMap[id]; }
  }
}

function updateLabelVisibility() {}

// ── Gradient helpers ───────────────────────────────────────────────────
function gradColor(pct) {
  if (pct < -6)  return '#0066dd';
  if (pct < -2)  return '#66aaff';
  if (pct < 2)   return '#22cc55';
  if (pct < 5)   return '#ffcc00';
  if (pct < 8)   return '#ff8800';
  return '#ff2200';
}

function showLegend(html) {
  const el = document.getElementById('overlay-legend');
  el.innerHTML = html; el.style.display = 'block';
}
function hideLegend() {
  document.getElementById('overlay-legend').style.display = 'none';
}

function clearOverlay() {
  if (gradientLayer) { gradientLayer.remove(); gradientLayer = null; }
  if (surfaceLayer)  { surfaceLayer.remove();  surfaceLayer  = null; }
  if (routeLayer) routeLayer.setStyle({ opacity: .6 });
  document.getElementById('btn-helling').classList.remove('active');
  document.getElementById('btn-surface').classList.remove('active');
  hideLegend();
}

// ── Gradient overlay ───────────────────────────────────────────────────
async function toggleGradient() {
  const btn = document.getElementById('btn-helling');
  const wasActive = btn.classList.contains('active');
  clearOverlay();
  if (wasActive) return;

  if (!routePts.length) return;
  btn.textContent = '⛰ Laden…';

  try {
    // Sample ~100 pts (≈ 5 km apart for 523 km route)
    const S = Math.max(1, Math.floor(routePts.length / 100));
    const sampled = routePts.filter((_, i) => i % S === 0);

    const elevations = [];
    for (let i = 0; i < sampled.length; i += 90) {
      const batch = sampled.slice(i, i + 90);
      const locs  = batch.map(([la,lo]) => `${la.toFixed(5)},${lo.toFixed(5)}`).join('|');
      const r = await fetch(`https://api.opentopodata.org/v1/srtm30m?locations=${locs}`);
      if (!r.ok) throw new Error('Elevation API ' + r.status);
      const d = await r.json();
      if (d.status !== 'OK') throw new Error(d.error || 'Elevation fout');
      elevations.push(...d.results.map(x => x.elevation ?? 0));
    }

    const lg = L.layerGroup();
    for (let i = 0; i < sampled.length - 1; i++) {
      const [la1,lo1] = sampled[i], [la2,lo2] = sampled[i+1];
      const distM = hav([la1,lo1],[la2,lo2]) * 1000;
      const dH    = (elevations[i+1]||0) - (elevations[i]||0);
      const pct   = distM > 10 ? (dH / distM) * 100 : 0;
      L.polyline([[la1,lo1],[la2,lo2]], {
        color: gradColor(pct), weight: 4, opacity: .9
      }).bindTooltip(`${pct >= 0 ? '+' : ''}${pct.toFixed(1)}%`).addTo(lg);
    }
    gradientLayer = lg;
    lg.addTo(map);
    if (routeLayer) routeLayer.setStyle({ opacity: 0 });
    btn.classList.add('active');
    showLegend(`
      <div class="leg-row"><span class="leg-swatch" style="background:#0066dd"></span> Steil dal (&lt; -6%)</div>
      <div class="leg-row"><span class="leg-swatch" style="background:#66aaff"></span> Dal (-6 tot -2%)</div>
      <div class="leg-row"><span class="leg-swatch" style="background:#22cc55"></span> Vlak (-2 tot 2%)</div>
      <div class="leg-row"><span class="leg-swatch" style="background:#ffcc00"></span> Lichte klim (2–5%)</div>
      <div class="leg-row"><span class="leg-swatch" style="background:#ff8800"></span> Klim (5–8%)</div>
      <div class="leg-row"><span class="leg-swatch" style="background:#ff2200"></span> Steil (&gt; 8%)</div>`);
  } catch(e) {
    console.error('Gradient:', e);
    clearOverlay();
  }
  btn.textContent = '⛰ Helling';
}

// ── Surface overlay ────────────────────────────────────────────────────
function surfColor(surf) {
  if (!surf) return '#999';
  const s = surf.toLowerCase();
  if (s === 'asphalt' || s === 'paved' || s === 'concrete' || s === 'tarmac') return '#888';
  if (s === 'compacted' || s === 'fine_gravel') return '#c8a455';
  if (s.includes('gravel') || s === 'unpaved') return '#b07030';
  if (s === 'ground' || s === 'dirt' || s === 'earth' || s === 'mud') return '#7a5525';
  if (s === 'grass' || s === 'sand') return '#6a9a40';
  if (s === 'sett' || s.includes('cobblestone') || s === 'paving_stones') return '#606060';
  return '#aaa';
}

async function toggleSurface() {
  const btn = document.getElementById('btn-surface');
  const wasActive = btn.classList.contains('active');
  clearOverlay();
  if (wasActive) return;

  if (!routePts.length) return;
  btn.textContent = '🛣 Laden…';

  try {
    // Sample ~50 pts along the route
    const S = Math.max(1, Math.floor(routePts.length / 50));
    const sampled = routePts.filter((_, i) => i % S === 0);

    const unions = sampled.map(([la,lo]) =>
      `way["highway"]["surface"](around:80,${la.toFixed(5)},${lo.toFixed(5)});`
    ).join('\n');
    const oq = `[out:json][timeout:60];\n(\n${unions}\n);\nout body geom;`;

    const r = await fetch('https://overpass-api.de/api/interpreter', {
      method: 'POST', body: 'data=' + encodeURIComponent(oq)
    });
    if (!r.ok) throw new Error('Overpass ' + r.status);
    const data = await r.json();
    const ways = data.elements || [];

    // For each sampled segment, find nearest OSM way and use its surface
    function nearestSurf(lat, lon) {
      let best = Infinity, surf = null;
      for (const w of ways) {
        if (!w.geometry) continue;
        for (const nd of w.geometry) {
          const d = (lat - nd.lat)**2 + (lon - nd.lon)**2;
          if (d < best) { best = d; surf = w.tags?.surface; }
        }
      }
      return surf || null;
    }

    const lg = L.layerGroup();
    for (let i = 0; i < sampled.length - 1; i++) {
      const [la1,lo1] = sampled[i], [la2,lo2] = sampled[i+1];
      const midLat = (la1+la2)/2, midLon = (lo1+lo2)/2;
      const surf = nearestSurf(midLat, midLon);
      L.polyline([[la1,lo1],[la2,lo2]], {
        color: surfColor(surf), weight: 4, opacity: .9
      }).bindTooltip(surf || 'onbekend').addTo(lg);
    }
    surfaceLayer = lg;
    lg.addTo(map);
    if (routeLayer) routeLayer.setStyle({ opacity: 0 });
    btn.classList.add('active');
    showLegend(`
      <div class="leg-row"><span class="leg-swatch" style="background:#888"></span> Asfalt / verhard</div>
      <div class="leg-row"><span class="leg-swatch" style="background:#c8a455"></span> Compacted / fijn gravel</div>
      <div class="leg-row"><span class="leg-swatch" style="background:#b07030"></span> Gravel / onverhard</div>
      <div class="leg-row"><span class="leg-swatch" style="background:#7a5525"></span> Grond / aarde</div>
      <div class="leg-row"><span class="leg-swatch" style="background:#6a9a40"></span> Gras / zand</div>
      <div class="leg-row"><span class="leg-swatch" style="background:#606060"></span> Kassei / stenen</div>
      <div class="leg-row"><span class="leg-swatch" style="background:#999"></span> Onbekend</div>`);
  } catch(e) {
    console.error('Surface:', e);
    clearOverlay();
  }
  btn.textContent = '🛣 Ondergrond';
}

function popupHtml(rd) {
  const km       = rd.distanceOnTrack ? rd.distanceOnTrack.toFixed(1) : '—';
  const finished = !rd.scratched && (rd.distanceOnTrack || 0) >= finishKm - 0.5;
  const status   = rd.scratched  ? '<span style="color:#f87171">DNF</span>'
    : finished                   ? '<span style="color:#4ade80">✓ Gefinisht</span>'
                                 : '<span style="color:#4ade80">Rijdend</span>';
  return `<div class="pu-name" style="color:${rd.riderColor}">${rd.name}</div>
    <div class="pu-meta">#${rd.teamNumber} · ${km} km · ${status}</div>
    <div class="pu-meta" style="margin-top:6px">
      <a href="rider.html?id=${rd.deviceId}" style="color:${rd.riderColor};font-size:11px">
        🔍 Zoek in de buurt van deze rijder
      </a>
    </div>`;
}

// ── Leaderboard ────────────────────────────────────────────────────────
let filterText = '';
function filterList() {
  filterText = document.getElementById('search').value.toLowerCase();
  renderList();
}

function renderList() {
  const sorted   = [...riders].sort((a, b) => (b.distanceOnTrack || 0) - (a.distanceOnTrack || 0));
  const filtered = filterText ? sorted.filter(r => r.name.toLowerCase().includes(filterText)) : sorted;
  const el = document.getElementById('rider-list');
  el.innerHTML = '';

  let rank = 0;
  let riderSepAdded = false;

  for (const rd of filtered) {
    const finished = !rd.scratched && (rd.distanceOnTrack || 0) >= finishKm - 0.5;
    if (!rd.scratched) rank++;

    // Separator between finishers and still-racing riders
    if (!finished && !rd.scratched && !riderSepAdded && !filterText) {
      const sep = document.createElement('div');
      sep.style.cssText = 'padding:4px 12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);background:var(--surface2);border-bottom:1px solid var(--border)';
      sep.textContent = 'Nog onderweg';
      el.appendChild(sep);
      riderSepAdded = true;
    }

    const km  = rd.distanceOnTrack ? rd.distanceOnTrack.toFixed(1) : '—';
    const row = document.createElement('div');
    row.className = 'rider-row' + (rd.scratched ? ' scratched-row' : '');
    row.innerHTML = `
      <span class="r-rank">${rd.scratched ? '' : rank}</span>
      <span class="r-dot" style="background:${rd.riderColor || '#888'}"></span>
      <span class="r-name">${rd.name}</span>
      ${rd.scratched  ? '<span class="r-scratch">DNF</span>'
      : finished      ? '<span class="r-fin">✓ Fin</span>'
                      : `<span class="r-km">${km} km</span>`}`;
    row.addEventListener('click', () => {
      const m = markerMap[rd.deviceId];
      if (m) { map.setView(m.getLatLng(), 13); m.openPopup(); }
    });
    el.appendChild(row);
  }
}

// ── Countdown ──────────────────────────────────────────────────────────
function startCountdown() {
  cdSecs = INTERVAL;
  clearInterval(cdTimer);
  cdTimer = setInterval(() => {
    cdSecs--;
    const m = Math.floor(cdSecs / 60), s = cdSecs % 60;
    document.getElementById('refresh-bar').textContent = `↺ ${m}:${String(s).padStart(2,'0')}`;
    if (cdSecs <= 0) { clearInterval(cdTimer); loadPositions().then(startCountdown); }
  }, 1000);
}

// ── Sidebar ────────────────────────────────────────────────────────────
function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  document.getElementById('sidebar').classList.toggle('collapsed', !sidebarOpen);
  setTimeout(() => map.invalidateSize(), 220);
}

initMap();
loadRoute();
loadPositions().then(startCountdown);
</script>
