<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bomba Tracker</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root {
      --bg:      #0a0f1e;
      --surface: #111827;
      --surface2:#1a2235;
      --border:  #1e2d4a;
      --text:    #e8eaf0;
      --muted:   #6b7a99;
      --red:     #e8194c;
      --teal:    #00c4d4;
      --green:   #4ade80;
      --navy:    #1e3a6e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text);
      font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 14px; }

    #app { display: flex; height: 100dvh; flex-direction: column; }

    /* ── Header ── */
    #header {
      background: var(--navy);
      padding: 8px 14px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0; gap: 10px; min-height: 48px;
    }
    #hdr-left  { display: flex; align-items: center; gap: 10px; min-width: 0; }
    #hdr-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    #back { font-size: 11px; color: rgba(255,255,255,.55); text-decoration: none; white-space: nowrap; }
    #back:hover { color: #fff; }
    #race-title { font-size: 14px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #live-badge {
      font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; flex-shrink: 0;
      background: rgba(232,25,76,.25); color: #ff6b8a; border: 1px solid rgba(232,25,76,.4);
      display: flex; align-items: center; gap: 4px;
    }
    .pulse { width: 6px; height: 6px; border-radius: 50%; background: var(--red); animation: pulse 1.4s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }
    #status-txt { font-size: 11px; color: rgba(255,255,255,.5); }
    #sidebar-toggle {
      background: none; border: 1px solid rgba(255,255,255,.2); color: rgba(255,255,255,.7);
      font-size: 11px; padding: 4px 8px; border-radius: 6px; cursor: pointer;
    }
    #sidebar-toggle:hover { color: #fff; border-color: rgba(255,255,255,.5); }

    /* ── Body ── */
    #body { display: flex; flex: 1; min-height: 0; }

    /* ── Sidebar ── */
    #sidebar {
      width: 280px; flex-shrink: 0; background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
      transition: width .2s ease;
    }
    #sidebar.collapsed { width: 0; border-right: none; }
    @media (max-width: 640px) {
      #sidebar { position: absolute; top: 48px; left: 0; bottom: 0; z-index: 500; width: 50vw; max-width: 260px; }
      #sidebar.collapsed { width: 0; }
    }

    /* ── Sidebar top stats ── */
    #sidebar-top { padding: 10px 12px 8px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    #stats-row { display: flex; gap: 6px; margin-bottom: 8px; }
    .stat-pill {
      font-size: 11px; padding: 2px 8px; border-radius: 12px;
      background: var(--surface2); border: 1px solid var(--border); color: var(--muted);
    }
    .stat-pill.active   { color: var(--green); border-color: rgba(74,222,128,.3); }
    .stat-pill.scratched { color: #f87171; border-color: rgba(248,113,113,.25); }

    /* ── Controls bar ── */
    #controls {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      display: flex; flex-wrap: wrap; gap: 6px;
      flex-shrink: 0;
    }
    .ctrl-btn {
      font-size: 11px; padding: 4px 10px; border-radius: 6px; cursor: pointer;
      background: var(--surface2); border: 1px solid var(--border); color: var(--muted);
      text-decoration: none; display: inline-flex; align-items: center; gap: 4px;
      transition: color .12s, border-color .12s, background .12s;
      white-space: nowrap;
    }
    .ctrl-btn:hover { color: var(--text); border-color: var(--muted); }
    .ctrl-btn.active { background: var(--teal); color: #0a0f1e; border-color: var(--teal); font-weight: 600; }
    .ctrl-btn.disabled { opacity: .4; cursor: not-allowed; pointer-events: none; }

    /* ── Search ── */
    #search-wrap { padding: 8px 12px 6px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    #search { width: 100%; padding: 6px 10px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 12px; }
    #search:focus { outline: none; border-color: var(--teal); }
    #search::placeholder { color: var(--muted); }

    /* ── Rider list ── */
    #rider-list { flex: 1; overflow-y: auto; }
    .rider-row {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 12px; border-bottom: 1px solid rgba(30,45,74,.5);
      cursor: pointer; transition: background .1s;
    }
    .rider-row:hover { background: var(--surface2); }
    .rider-row.scratched-row { opacity: .4; }
    .r-rank    { font-size: 11px; color: var(--muted); width: 22px; text-align: right; flex-shrink: 0; }
    .r-dot     { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .r-name    { flex: 1; font-size: 12px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .r-km      { font-size: 11px; color: var(--muted); flex-shrink: 0; }
    .r-scratch { font-size: 10px; color: #f87171; flex-shrink: 0; }
    .r-fin     { font-size: 10px; font-weight: 700; color: var(--green); flex-shrink: 0; }

    /* ── Map ── */
    #map { flex: 1; min-width: 0; position: relative; }
    .leaflet-container { background: #0a0f1e; }

    #refresh-bar {
      position: absolute; bottom: 10px; right: 10px; z-index: 800;
      background: rgba(10,15,30,.8); border: 1px solid var(--border);
      border-radius: 6px; padding: 4px 10px; font-size: 11px; color: var(--muted);
      pointer-events: none;
    }

    /* ── Rider name labels ── */
    .rider-label {
      background: none !important; border: none !important; box-shadow: none !important;
      padding: 0 !important;
    }
    .rider-label::before { display: none !important; }
    .rl-inner {
      font-size: 11px; font-weight: 700; color: #fff;
      background: rgba(0,0,0,.75); padding: 2px 5px;
      border-radius: 2px; white-space: nowrap; pointer-events: none;
      text-shadow: 0 1px 2px rgba(0,0,0,.9);
    }

    /* ── Label visibility ── */
    .labels-hidden .rider-label { display: none !important; }

    /* ── Sidebar section headers ── */
    .section-hdr {
      padding: 5px 12px 4px; font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .08em;
      color: var(--muted); background: var(--surface2);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .section-collapse {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 13px; padding: 0 4px; font-family: inherit;
    }
    .section-collapse:hover { color: var(--text); }

    /* ── Overlay legend ── */
    #overlay-legend {
      display: none;
      position: absolute; bottom: 40px; left: 10px; z-index: 800;
      background: rgba(10,15,30,.88); border: 1px solid var(--border);
      border-radius: 6px; padding: 7px 10px; font-size: 10px;
      pointer-events: none; line-height: 1.6;
    }
    .leg-row { display: flex; align-items: center; gap: 5px; }
    .leg-swatch { width: 16px; height: 4px; border-radius: 2px; flex-shrink: 0; }

    /* ── Route Ranking Panel ── */
    #route-rank-panel {
      position: absolute; top: 10px; left: 10px; z-index: 800;
      background: rgba(10,15,30,.96); border: 1px solid var(--border);
      border-radius: 10px; width: 260px; max-height: calc(100% - 20px);
      display: flex; flex-direction: column; overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,.6);
    }
    #rrp-header { padding: 10px 12px 8px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    #rrp-km { font-size: 11px; color: var(--teal); font-weight: 700; margin-bottom: 6px; }
    #rrp-filters { display: flex; gap: 4px; align-items: center; }
    .rrp-btn {
      font-size: 10px; padding: 3px 8px; border-radius: 5px; cursor: pointer;
      background: var(--surface2); border: 1px solid var(--border); color: var(--muted);
      transition: color .1s, background .1s, border-color .1s;
    }
    .rrp-btn.active { background: var(--teal); color: #0a0f1e; border-color: var(--teal); font-weight: 700; }
    #rrp-close { margin-left: auto; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 0 2px; line-height: 1; }
    #rrp-close:hover { color: var(--text); }
    #rrp-list { flex: 1; overflow-y: auto; }
    .rrp-row {
      display: flex; align-items: center; gap: 7px;
      padding: 6px 12px; border-bottom: 1px solid rgba(30,45,74,.5); font-size: 12px;
    }
    .rrp-rank { font-size: 10px; color: var(--muted); width: 18px; text-align: right; flex-shrink: 0; }
    .rrp-dot  { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .rrp-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .rrp-time { font-size: 10px; color: var(--teal); flex-shrink: 0; font-weight: 600; }
    .rrp-empty { padding: 20px 12px; font-size: 12px; color: var(--muted); text-align: center; }
    @media (max-width: 640px) {
      #route-rank-panel { top: auto; bottom: 40px; left: 4px; right: 4px; width: auto; max-height: 50vh; }
    }
    .map-crosshair { cursor: crosshair !important; }

    /* ── POI search panel ── */
    #poi-section { border-bottom: 1px solid var(--border); flex-shrink: 0; }
    #poi-toggle {
      width: 100%; padding: 8px 12px;
      display: flex; align-items: center; justify-content: space-between;
      background: none; border: none; cursor: pointer;
      font-size: 11px; color: var(--muted); font-family: inherit;
    }
    #poi-toggle:hover { color: var(--text); }
    #poi-body { display: none; padding: 8px 12px 10px; }
    #poi-body.open { display: block; }
    #poi-row { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 6px; }
    #poi-input {
      flex: 1 1 100%; padding: 7px 10px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); font-size: 12px; font-family: inherit;
    }
    #poi-input::placeholder { color: var(--muted); }
    #poi-input:focus { outline: none; border-color: var(--teal); }
    #poi-dist {
      flex: 1; padding: 7px 6px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; color: var(--muted); font-size: 12px; cursor: pointer;
    }
    #poi-btn {
      flex: 2; padding: 7px 12px;
      background: var(--teal); border: none; border-radius: 6px;
      color: #0a0f1e; font-size: 12px; font-weight: 700; cursor: pointer;
    }
    #poi-status { font-size: 10px; color: var(--muted); margin-bottom: 4px; min-height: 14px; }
    #poi-layers { display: flex; flex-direction: column; gap: 3px; }
    .poi-layer {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; padding: 4px 6px;
      background: var(--surface2); border-radius: 4px; border: 1px solid var(--border);
    }
    .poi-dot  { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .poi-lbl  { flex: 1; color: var(--text); }
    .poi-cnt  { font-size: 10px; color: var(--muted); }
    .poi-vis, .poi-rm { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 12px; padding: 0 2px; }
    .poi-vis:hover, .poi-rm:hover { color: var(--text); }

    /* ── Race Flow modal ── */
    #raceflow-modal {
      position: fixed; inset: 0; z-index: 2000;
      background: rgba(0,0,0,.7); display: flex; align-items: center; justify-content: center;
    }
    #raceflow-inner {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      width: min(95vw, 760px); max-height: 90vh; display: flex; flex-direction: column;
      overflow: hidden; box-shadow: 0 8px 40px rgba(0,0,0,.7);
    }
    #raceflow-hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0;
      font-size: 13px; font-weight: 700;
    }
    #raceflow-hdr select {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--muted); font-size: 11px; padding: 3px 6px; border-radius: 4px; cursor: pointer;
    }
    #raceflow-close {
      background: none; border: none; color: var(--muted); font-size: 18px;
      cursor: pointer; padding: 0 4px; line-height: 1;
    }
    #raceflow-close:hover { color: var(--text); }
    #raceflow-canvas { flex: 1; display: block; min-height: 0; width: 100%; }
    #raceflow-legend {
      display: flex; flex-wrap: wrap; gap: 8px;
      padding: 8px 16px; border-top: 1px solid var(--border); flex-shrink: 0;
      font-size: 10px;
    }
    .rf-leg-item { display: flex; align-items: center; gap: 4px; }
    .rf-leg-dot  { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    #raceflow-status { padding: 8px 16px; font-size: 12px; color: var(--muted); text-align: center; }

    /* ── Popups ── */
    .leaflet-popup-content-wrapper { background: #111827; border: 1px solid #1e2d4a; border-radius: 8px; color: #e8eaf0; box-shadow: 0 4px 20px rgba(0,0,0,.5); }
    .leaflet-popup-tip { background: #111827; }
    .leaflet-popup-content { margin: 10px 14px; font-size: 13px; }
    .pu-name { font-weight: 700; margin-bottom: 4px; }
    .pu-meta { font-size: 11px; color: #6b7a99; }
    .cp-label { background: rgba(10,15,30,.85) !important; border: none !important; box-shadow: none !important; color: #e8eaf0 !important; font-size: 10px !important; font-weight: 700 !important; white-space: nowrap; }
    .cp-label::before { display: none !important; }
  </style>
</head>
<body>
<div id="app">

  <div id="header">
    <div id="hdr-left">
      <a id="back" href="../bomba/index.html">← Bomba</a>
      <div id="race-title">Laden…</div>
      <div id="live-badge"><span class="pulse"></span>Live</div>
    </div>
    <div id="hdr-right">
      <span id="status-txt">Loading…</span>
      <button id="sidebar-toggle" onclick="toggleSidebar()">☰ Klassement</button>
    </div>
  </div>

  <div id="body">
    <div id="sidebar">

      <div id="sidebar-top">
        <div id="stats-row">
          <span class="stat-pill active"    id="pill-active">— rijdend</span>
          <span class="stat-pill scratched" id="pill-scratch">— uitgevallen</span>
        </div>
      </div>

      <div id="controls">
        <button class="ctrl-btn" id="btn-poi" onclick="togglePoi()">🔍 Langs route</button>
        <button class="ctrl-btn" id="btn-raceflow" onclick="openRaceFlow()">📊 Race Flow</button>
        <button class="ctrl-btn" id="btn-route-rank" onclick="toggleRouteRanking()" title="Klik op de route voor doortijden">📍 Routeranglijst</button>
        <button class="ctrl-btn active" id="btn-labels" onclick="toggleLabels()" title="Naamlabels aan/uit">🏷 Labels</button>
        <button class="ctrl-btn" id="btn-helling" onclick="toggleGradient()" title="Kleur route op hellingshoek">⛰ Helling</button>
        <button class="ctrl-btn" id="btn-surface" onclick="toggleSurface()" title="Kleur route op ondergrond">🛣 Ondergrond</button>
      </div>

      <!-- POI search -->
      <div id="poi-section">
        <button id="poi-toggle" onclick="togglePoiPanel()">
          <span>📍 Zoek langs route</span><span id="poi-arrow">▸</span>
        </button>
        <div id="poi-body">
          <div id="poi-row">
            <input id="poi-input" placeholder="hotel, apotheek, mcdonalds…" type="text">
            <select id="poi-dist">
              <option value="1">1 km</option>
              <option value="2" selected>2 km</option>
              <option value="5">5 km</option>
              <option value="10">10 km</option>
            </select>
            <button id="poi-btn" onclick="searchPoi()">Zoek</button>
          </div>
          <div id="poi-status"></div>
          <div id="poi-layers"></div>
        </div>
      </div>

      <div id="search-wrap">
        <input id="search" type="text" placeholder="Zoek rijder…" oninput="filterList()">
      </div>

      <div id="rider-list"></div>
    </div>

    <div id="map">
      <div id="route-rank-panel" style="display:none">
        <div id="rrp-header">
          <div id="rrp-km">Klik op de route om een punt te kiezen</div>
          <div id="rrp-filters">
            <button class="rrp-btn active" id="rrpf-all"   onclick="setRRFilter('all')">Alles</button>
            <button class="rrp-btn"        id="rrpf-top10" onclick="setRRFilter('top10')">Top 10</button>
            <button class="rrp-btn"        id="rrpf-top25" onclick="setRRFilter('top25')">Top 25</button>
            <button id="rrp-close" onclick="closeRouteRanking()">✕</button>
          </div>
        </div>
        <div id="rrp-list"><div class="rrp-empty">Klik op een punt op de route</div></div>
      </div>
      <div id="refresh-bar">↺ —</div>
      <div id="overlay-legend"></div>
    </div>
  </div>
</div>

<!-- Race Flow modal -->
<div id="raceflow-modal" style="display:none" onclick="if(event.target===this)closeRaceFlow()">
  <div id="raceflow-inner">
    <div id="raceflow-hdr">
      <span>📊 Race Flow — Positie vs. Tijd</span>
      <div style="display:flex;align-items:center;gap:8px">
        <select id="rf-count" onchange="loadRaceFlow()">
          <option value="5">Top 5</option>
          <option value="10" selected>Top 10</option>
          <option value="20">Top 20</option>
        </select>
        <button id="raceflow-close" onclick="closeRaceFlow()">✕</button>
      </div>
    </div>
    <canvas id="raceflow-canvas" height="380"></canvas>
    <div id="raceflow-legend"></div>
    <div id="raceflow-status"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
'use strict';
const API      = 'https://tracker.klikschaak.nl';
const RC       = new URLSearchParams(location.search).get('race') || '';
const INTERVAL = 300;

let SLUG       = '';
let raceConfig = null;
let RACE_START = new Date();

let map, routeLayer;
let markerMap   = {};
let riders      = [];
let finishKm    = Infinity;
let mapCentered = false;
let sidebarOpen = window.innerWidth > 640;
let cdSecs = INTERVAL, cdTimer;

let routePts      = [];
let routeCum      = [];
let gradientLayer = null;
let surfaceLayer  = null;

// ── Map ────────────────────────────────────────────────────────────────
function initMap() {
  map = L.map('map', { zoomControl: false }).setView([48, 10], 5);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://openstreetmap.org/copyright">OpenStreetMap</a>', maxZoom: 19
  }).addTo(map);
  L.control.zoom({ position: 'bottomright' }).addTo(map);
  map.on('zoomend', updateLabelVisibility);
  map.on('click', function(e) {
    if (!routeRankingMode || !routePts.length) return;
    const nearest = nearestRoutePt(e.latlng.lat, e.latlng.lng);
    if (nearest.dist > 10) return;
    if (selectedRouteMarker) selectedRouteMarker.remove();
    selectedRouteMarker = L.circleMarker(routePts[nearest.idx], {
      radius: 9, color: '#ffbc00', fillColor: '#ffbc00', fillOpacity: 1, weight: 2, pane: 'markerPane'
    }).addTo(map);
    showRouteRanking(nearest.km);
  });
  document.getElementById('sidebar').classList.toggle('collapsed', !sidebarOpen);
  setTimeout(() => map.invalidateSize(), 250);
}

// ── Haversine ──────────────────────────────────────────────────────────
function hav([la1,lo1],[la2,lo2]) {
  const R = 6371, r = Math.PI/180;
  const a = Math.sin((la2-la1)*r/2)**2 + Math.cos(la1*r)*Math.cos(la2*r)*Math.sin((lo2-lo1)*r/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ── Route + Checkpoints ────────────────────────────────────────────────
function routeSetStyle(opts) { if (routeLayer) routeLayer.forEach(l => l.setStyle(opts)); }

async function loadRoute() {
  if (!SLUG && !raceConfig?.routeFile) return;

  try {
    if (raceConfig?.routeFile) {
      // GeoJSON route via FMC API (e.g. Seven Serpents)
      const r = await fetch(`${API}/api/fmc/${RC}/route?f=${raceConfig.routeFile}`);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const geojson = await r.json();
      if (routeLayer) routeLayer.forEach(l => l.remove());
      routeLayer = [L.geoJSON(geojson, {
        style: { color: '#00c4d4', weight: 2, opacity: .6 },
        coordsToLatLng: c => L.latLng(parseFloat(c[1]), parseFloat(c[0]))
      }).addTo(map)];
      const pts = [];
      for (const feat of (geojson.features || [])) {
        const geom  = feat.geometry;
        const lines = geom.type === 'MultiLineString' ? geom.coordinates : [geom.coordinates];
        for (const line of lines) for (const c of line) pts.push([parseFloat(c[1]), parseFloat(c[0])]);
      }
      const step = Math.max(1, Math.floor(pts.length / 2000));
      routePts = pts.filter((_, i) => i % step === 0);
    } else {
      // Komoot route: static JSON files per race slug
      const [rr, sr] = await Promise.all([
        fetch(`/${SLUG}/route.json`),
        fetch(`/${SLUG}/route-segments.json`)
      ]);
      if (!rr.ok) throw new Error(`HTTP ${rr.status}`);
      routePts = await rr.json();
      if (routeLayer) routeLayer.forEach(l => l.remove());
      const segs = sr.ok ? await sr.json() : null;
      if (segs && segs.length > 1) {
        routeLayer = segs.map(s =>
          L.polyline(routePts.slice(s.from, s.to + 1), { color: '#00c4d4', weight: 2, opacity: .6 }).addTo(map)
        );
      } else {
        routeLayer = [L.polyline(routePts, { color: '#00c4d4', weight: 2, opacity: .6 }).addTo(map)];
      }
    }

    routeCum = [0];
    for (let i = 1; i < routePts.length; i++)
      routeCum.push(routeCum[i-1] + hav(routePts[i-1], routePts[i]));
  } catch(e) { console.warn('Route load failed:', e.message); }

  // Checkpoints (only available for Komoot routes)
  if (!raceConfig?.routeFile) {
    try {
      const r = await fetch(`/${SLUG}/checkpoints.json`);
      if (!r.ok) return;
      const cps = await r.json();
      cps.forEach(cp => {
        const isFinish = cp.label === 'Finish' || cp.label === 'FINISH';
        const isStart  = cp.label === 'Start'  || cp.label === 'START';
        const color    = isFinish ? '#4ade80' : isStart ? '#f0a500' : '#00c4d4';
        L.circleMarker([cp.lat, cp.lon], {
          radius: 7, color, fillColor: color, fillOpacity: 1, weight: 2
        }).addTo(map).bindTooltip(cp.label, { permanent: true, direction: 'top',
          className: 'cp-label', offset: [0, -8] });
      });
    } catch(e) { console.warn('Checkpoints load failed:', e.message); }
  }
}

// ── Positions ──────────────────────────────────────────────────────────
async function loadPositions() {
  try {
    const r = await fetch(`${API}/api/fmc/${RC}/positions`);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    riders = await r.json();
    const dists  = riders.filter(r => !r.scratched).map(r => r.distanceOnTrack || 0);
    const maxDist = dists.length ? Math.max(...dists) : 0;
    finishKm = maxDist > 0 ? maxDist : Infinity;
    renderMarkers();
    renderList();
    if (!riderHistoryCache) {
      fetch(`${API}/api/fmc/${RC}/history`)
        .then(r => r.ok ? r.json() : null)
        .then(data => { if (data) { riderHistoryCache = data; renderList(); } })
        .catch(() => {});
    }
    if (!mapCentered) {
      const leader = riders.filter(r => !r.scratched && r.latitude && r.longitude)
                           .sort((a, b) => (b.distanceOnTrack || 0) - (a.distanceOnTrack || 0))[0];
      if (leader) { map.setView([leader.latitude, leader.longitude], 11); mapCentered = true; }
    }
    const finished  = riders.filter(r => !r.scratched && r.distanceOnTrack >= finishKm - 0.5).length;
    const active    = riders.filter(r => !r.scratched && r.distanceOnTrack  < finishKm - 0.5).length;
    const scratched = riders.filter(r =>  r.scratched).length;
    document.getElementById('pill-active').textContent  = `${finished} fin · ${active} rijdend`;
    document.getElementById('pill-scratch').textContent = `${scratched} DNF`;
    document.getElementById('status-txt').textContent   =
      `${riders.length} riders · ${new Date().toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'})}`;
  } catch(e) {
    document.getElementById('status-txt').textContent = 'Error: ' + e.message;
  }
}

function renderMarkers() {
  const seen = new Set();

  for (const rd of riders) {
    seen.add(rd.deviceId);

    const opacity = rd.scratched ? 0.3 : 0.9;

    if (markerMap[rd.deviceId]) {
      markerMap[rd.deviceId]

    } else {
      const firstName = rd.name.split(' ')[0];
      const m = L.circleMarker([rd.latitude, rd.longitude], {
        radius: rd.scratched ? 4 : 6, color, fillColor: color,
        fillOpacity: opacity, opacity, weight: 1.5
      }).addTo(map).bindPopup(() => popupHtml(riders.find(r => r.deviceId === rd.deviceId) || rd));

      if (!rd.scratched) {

// ── Gradient overlay ───────────────────────────────────────────────────
const GRADIENT_STEP = 4;

const GRAD_STOPS = [
  [-8,       '#1e3a8a'],
  [-4,       '#2563eb'],
  [-1.5,     '#93c5fd'],
  [ 1.5,     '#4ade80'],
  [ 4,       '#fde047'],
  [ 8,       '#f97316'],
  [12,       '#ef4444'],
  [Infinity, '#111827'],
];
function gradColor(pct) {
  for (const [max, col] of GRAD_STOPS) if (pct < max) return col;
  return '#111827';
}

function buildGradientLines(gradPts) {
  const sm = gradPts.map((p, i) => {
    const s = Math.max(0, i - 2), e = Math.min(gradPts.length - 1, i + 2);
    let sum = 0, n = 0;
    for (let j = s; j <= e; j++) { sum += gradPts[j][2]; n++; }
    return [p[0], p[1], sum / n];
  });

  const lines = [];
  let col = null, seg = [];

  for (let i = 0; i < sm.length - 1; i++) {
    const distKm = hav([sm[i][0], sm[i][1]], [sm[i+1][0], sm[i+1][1]]);
    const grad   = distKm > 0.03 ? (sm[i+1][2] - sm[i][2]) / (distKm * 10) : 0;
    const c      = gradColor(grad);

    const ri0 = i * GRADIENT_STEP;
    const ri1 = Math.min((i + 1) * GRADIENT_STEP + 1, routePts.length);
    const sub  = routePts.length > 0
      ? routePts.slice(ri0, ri1).map(p => [p[0], p[1]])
      : [[sm[i][0], sm[i][1]], [sm[i+1][0], sm[i+1][1]]];

    if (c !== col) {
      if (seg.length >= 2)
        lines.push(L.polyline(seg, { color: col, weight: 5, opacity: .85,
          lineJoin: 'round', lineCap: 'butt' }));
      col = c; seg = sub.slice();
    } else {
      if (sub.length > 1) seg.push(...sub.slice(1));
    }
  }
  if (seg.length >= 2)
    lines.push(L.polyline(seg, { color: col, weight: 5, opacity: .85, lineJoin: 'round' }));
  return lines;
}

// ── Surface overlay ────────────────────────────────────────────────────
function buildSurfaceLines(surf) {
  if (!routePts.length || !surf.length) return [];
  const lines = [];
  let seg = null;
  const len = Math.min(routePts.length, surf.length);

  for (let i = 0; i <= len; i++) {
    const unpaved = i < len && surf[i] === 1;
    if (!unpaved) {
      if (seg && seg.length >= 2)
        lines.push(L.polyline(seg, {
          color: '#b45309', weight: 5, opacity: .9,
          dashArray: '8 5', lineJoin: 'round', lineCap: 'round',
        }));
      seg = null;
    } else {
      const pt = [routePts[i][0], routePts[i][1]];
      if (!seg) seg = [pt]; else seg.push(pt);
    }
  }
  return lines;
}

// ── Rider Tracks ───────────────────────────────────────────────────────
const riderTracks = {};

function durStr(ms) {
  if (!ms || ms < 60000) return '—';
  const m = Math.floor(ms / 60000), h = Math.floor(m / 60);
  return h > 0 ? `${h}u ${String(m % 60).padStart(2,'0')}m` : `${m}m`;
}

function drawHourMarkers(pts) {
  const markers = [], timed = pts.filter(p => p[2]);
  if (timed.length < 2) return markers;
  const t0 = timed[0][2], t1 = timed[timed.length-1][2];
  for (let t = Math.ceil(t0/3600000)*3600000; t <= t1; t += 3600000) {
    let best = null, bestDiff = Infinity;
    for (const p of timed) {
      const d = Math.abs(p[2] - t);
      if (d < bestDiff) { bestDiff = d; best = p; }
    }
    if (!best || bestDiff > 35*60000) continue;
    const label = new Date(t).toLocaleTimeString('nl-NL', { hour:'2-digit', minute:'2-digit', timeZone:'Europe/Amsterdam' });
    const icon = L.divIcon({ className: 'poi-icon',
      html: `<div style="background:rgba(10,15,30,.9);border:1.5px solid #4ade80;border-radius:3px;padding:1px 5px;font-size:10px;font-weight:700;color:#4ade80;white-space:nowrap;line-height:15px;box-shadow:0 1px 4px rgba(0,0,0,.6)">${label}</div>`,
      iconAnchor: [0, 8], iconSize: null });
    markers.push(L.marker([best[0], best[1]], { icon, interactive: false }).addTo(map));
  }
  return markers;
}

function extractStopsFromTrack(pts) {
  const stops = [], timed = pts.filter(p => p[2]);
  for (let i = 0; i < timed.length - 1; i++) {
    const gap = timed[i+1][2] - timed[i][2];
    if (gap > 10*60000)
      stops.push({ lat: timed[i][0], lon: timed[i][1], startMs: timed[i][2], durationMs: gap });
  }
  return stops;
}

function drawStopMarkers(stops) {
  return stops.map(s => {
    const dur  = durStr(s.durationMs);
    const time = new Date(s.startMs).toLocaleTimeString('nl-NL', { hour:'2-digit', minute:'2-digit', timeZone:'Europe/Amsterdam' });
    const icon = L.divIcon({ className: 'poi-icon',
      html: `<div style="background:rgba(10,15,30,.96);border:2px solid #f0a500;border-radius:4px;padding:3px 7px;font-size:11px;font-weight:700;color:#f0a500;white-space:nowrap;line-height:16px;box-shadow:0 2px 6px rgba(0,0,0,.8)">${dur}<br><span style="font-weight:400;font-size:10px;opacity:.9">${time}</span></div>`,
      iconAnchor: [0, 8], iconSize: null });
    return L.marker([s.lat, s.lon], { icon, interactive: false }).addTo(map);
  });
}

async function toggleTrack(id) {
  if (riderTracks[id]) {
    riderTracks[id].line.remove();
    riderTracks[id].hourMarkers.forEach(m => m.remove());
    riderTracks[id].stopMarkers.forEach(m => m.remove());
    delete riderTracks[id];
  } else {
    try {
      const res = await fetch(`${API}/api/fmc/${RC}/track/${id}`);
      const pts = await res.json();
      if (pts.length > 1) {
        const line = L.polyline(pts.map(p => [p[0], p[1]]), {
          color: '#4ade80', weight: 3, opacity: .85, lineJoin: 'round', lineCap: 'round'
        }).addTo(map);
        const hourMarkers = drawHourMarkers(pts);
        const stopMarkers = drawStopMarkers(extractStopsFromTrack(pts));
        riderTracks[id] = { line, hourMarkers, stopMarkers };
        map.fitBounds(line.getBounds(), { padding: [40, 40], maxZoom: 14 });
      }
    } catch(e) { console.error('Track error:', e); }
  }
  updateLabelVisibility();
  const rd = riders.find(r => String(r.deviceId) === id);
  if (rd && markerMap[rd.deviceId]) markerMap[rd.deviceId].setPopupContent(popupHtml(rd));
}

const POI_COLORS = ['#f59e0b','#38bdf8','#a78bfa','#fb7185','#34d399','#f97316','#e879f9','#facc15'];
const poiLayers  = {};
let   poiColorIdx = 0;

function togglePoi() {
  const body = document.getElementById('poi-body');
  const open = body.classList.toggle('open');
  document.getElementById('poi-arrow').textContent = open ? '▾' : '▸';
  document.getElementById('btn-poi').classList.toggle('active', open);
}

function togglePoiPanel() { togglePoi(); }

async function searchPoi() {
  const q       = document.getElementById('poi-input').value.trim();
  const maxdist = document.getElementById('poi-dist').value;
  const status  = document.getElementById('poi-status');
  if (!q) return;
  const key = `${q}|${maxdist}km`;
  if (poiLayers[key]) { status.textContent = 'Al geladen — zie laag hieronder.'; return; }
  status.textContent = '⏳ Zoeken…';
  document.getElementById('poi-btn').disabled = true;
  try {
    const res = await fetch(`${API}/api/fmc/${RC}/poi?q=${encodeURIComponent(q)}&maxdist=${maxdist}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const pts  = data.results ?? data;
    const errs = data.errors ?? [];
    if (!pts.length && !errs.length) { status.textContent = `Niets gevonden voor "${q}".`; return; }
    if (pts.length) {
      const color = POI_COLORS[poiColorIdx++ % POI_COLORS.length];
      const icon  = L.divIcon({
        className: 'poi-icon',
        html: `<div style="width:16px;height:16px;border-radius:50%;background:${color};border:2px solid #fff;box-shadow:0 2px 5px rgba(0,0,0,.6)"></div>`,
        iconSize: [16,16], iconAnchor: [8,8], popupAnchor: [0,-10]
      });
      const markers = pts.map(p => L.marker([p.lat, p.lon], { icon })
        .addTo(map)
        .bindPopup(`<b style="color:${color}">${p.name}</b>${p.address ? '<br><small>'+p.address+'</small>' : ''}`));
      poiLayers[key] = { markers, visible: true, color, label: q, count: pts.length };
      renderPoiLayers();
    }
    status.textContent = pts.length
      ? `✓ ${pts.length} resultaten${errs.length ? ` (⚠ ${errs.length} zones mislukt)` : ''}`
      : `⚠ Alle zones mislukt — probeer opnieuw`;
  } catch(e) {
    status.textContent = `Fout: ${e.message}`;
  } finally {
    document.getElementById('poi-btn').disabled = false;
  }
}

function renderPoiLayers() {
  document.getElementById('poi-layers').innerHTML = Object.entries(poiLayers).map(([key, l]) => `
    <div class="poi-layer">
      <div class="poi-dot" style="background:${l.color};opacity:${l.visible?1:.35}"></div>
      <span class="poi-lbl">${l.label}</span>
      <span class="poi-cnt">${l.count}</span>
      <button class="poi-vis" onclick="togglePoiLayer('${key}')">${l.visible?'👁':'○'}</button>
      <button class="poi-rm"  onclick="removePoiLayer('${key}')">✕</button>
    </div>`).join('');
}

function togglePoiLayer(key) {
  const l = poiLayers[key]; if (!l) return;
  l.visible = !l.visible;
  l.markers.forEach(m => l.visible ? m.addTo(map) : m.remove());
  renderPoiLayers();
}

function removePoiLayer(key) {
  const l = poiLayers[key]; if (!l) return;
  l.markers.forEach(m => m.remove());
  delete poiLayers[key];
  renderPoiLayers();
}

async function loadRaceFlow() {
  const count  = document.getElementById('rf-count').value;
  const status = document.getElementById('raceflow-status');
  const legend = document.getElementById('raceflow-legend');
  status.textContent = '⏳ Laden…'; legend.innerHTML = '';
  try {
    const res = await fetch(`${API}/api/fmc/${RC}/raceflow?count=${count}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (!data.riders?.length) { status.textContent = 'Nog geen data beschikbaar.'; return; }
    status.textContent = '';
    drawRaceFlowChart(data);
    legend.innerHTML = data.riders.map(r =>
      `<div class="rf-leg-item"><div class="rf-leg-dot" style="background:${r.color}"></div><span style="color:#e8eaf0">${r.name}</span></div>`
    ).join('');
  } catch(e) {
    status.textContent = `Fout: ${e.message}`;
  }

function drawRaceFlowChart({ riders, totalKm, raceStart }) {
  const canvas = document.getElementById('raceflow-canvas');
  const W = canvas.offsetWidth || 700;
  canvas.width  = W;
  canvas.height = 380;
  const ctx = canvas.getContext('2d');
  const pad = { top: 20, right: 20, bottom: 45, left: 55 };
  const cW  = W - pad.left - pad.right;
  const cH  = canvas.height - pad.top - pad.bottom;

  ctx.clearRect(0, 0, W, canvas.height);
  ctx.fillStyle = '#111827';
  ctx.fillRect(0, 0, W, canvas.height);

  const now      = Date.now();
  const startMs  = raceStart || RACE_START.getTime();
  const elapsedH = (now - startMs) / 3600000;
  const maxKm    = totalKm || Math.max(1, ...riders.flatMap(r => r.pts.map(p => p[1])));

  const xS = t  => pad.left + ((t - startMs) / 3600000) / elapsedH * cW;
  const yS = km => pad.top  + (1 - km / maxKm) * cH;

  ctx.strokeStyle = '#1e2d4a'; ctx.lineWidth = 1;
  const hStep = elapsedH > 12 ? 4 : elapsedH > 6 ? 2 : 1;
  for (let h = 0; h <= elapsedH; h += hStep) {
    const x = xS(startMs + h * 3600000);
    ctx.beginPath(); ctx.moveTo(x, pad.top); ctx.lineTo(x, pad.top + cH); ctx.stroke();
    ctx.fillStyle = '#6b7a99'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(`+${h}u`, x, pad.top + cH + 14);
  }
  const kmStep = maxKm > 400 ? 100 : maxKm > 200 ? 50 : 25;
  for (let km = 0; km <= maxKm; km += kmStep) {
    const y = yS(km);
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + cW, y); ctx.stroke();
    ctx.fillStyle = '#6b7a99'; ctx.font = '10px sans-serif'; ctx.textAlign = 'right';
    ctx.fillText(`${km} km`, pad.left - 6, y + 4);
  }

  ctx.strokeStyle = '#374151'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(pad.left, pad.top); ctx.lineTo(pad.left, pad.top + cH); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(pad.left, pad.top + cH); ctx.lineTo(pad.left + cW, pad.top + cH); ctx.stroke();

  for (const r of riders) {
    if (r.pts.length < 2) continue;
    ctx.strokeStyle = r.color || '#888';
    ctx.lineWidth   = 2.5;
    ctx.lineJoin    = 'round';
    ctx.beginPath();
    let started = false;
    for (const [t, km] of r.pts) {
      if (t < startMs) continue;
      const x = xS(t), y = yS(km);
      if (!started) { ctx.moveTo(x, y); started = true; } else ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
}

// ── Route Ranking ──────────────────────────────────────────────────────
let riderHistoryCache   = null;
let routeRankingMode    = false;
let routeRankingFilter  = 'all';
let selectedRouteMarker = null;
let lastClickedKm       = null;
let labelsVisible       = true;
let finishersCollapsed  = false;

async function toggleRouteRanking() {
  routeRankingMode = !routeRankingMode;
  document.getElementById('btn-route-rank').classList.toggle('active', routeRankingMode);
  if (routeRankingMode) {
    document.getElementById('route-rank-panel').style.display = 'flex';
    map.getContainer().classList.add('map-crosshair');
    if (!riderHistoryCache) {
      try {
        const r = await fetch(`${API}/api/fmc/${RC}/history`);
        if (r.ok) riderHistoryCache = await r.json();
      } catch(e) { console.warn('History load failed:', e.message); }
    }
  } else {
    closeRouteRanking();
  }
}

function closeRouteRanking() {
  routeRankingMode = false;
  document.getElementById('btn-route-rank').classList.remove('active');
  document.getElementById('route-rank-panel').style.display = 'none';
  map.getContainer().classList.remove('map-crosshair');
  if (selectedRouteMarker) { selectedRouteMarker.remove(); selectedRouteMarker = null; }
  lastClickedKm = null;
}

function setRRFilter(f) {
  routeRankingFilter = f;
  ['all','top10','top25'].forEach(id =>
    document.getElementById('rrpf-' + id).classList.toggle('active', id === f)
  );
  if (lastClickedKm !== null) showRouteRanking(lastClickedKm);
}

function nearestRoutePt(lat, lon) {
  let bestIdx = 0, bestDist = Infinity;
  for (let i = 0; i < routePts.length; i++) {
    const d = hav([lat, lon], routePts[i]);
    if (d < bestDist) { bestDist = d; bestIdx = i; }
  }
  return { idx: bestIdx, km: routeCum[bestIdx], dist: bestDist };
}

function showRouteRanking(clickedKm) {
  lastClickedKm = clickedKm;
  const elapsed = Date.now() - RACE_START.getTime();

  const passed = riders
    .filter(r => !r.scratched && (r.distanceOnTrack || 0) >= clickedKm && r.distanceOnTrack > 0)
    .map(r => {
      const id    = String(r.deviceId);
      const rHist = riderHistoryCache?.[id];
      let estMs, isActual = false;

      if (rHist && rHist.length >= 1) {
        for (let i = 0; i < rHist.length; i++) {
          if (rHist[i][0] >= clickedKm) {
            if (i === 0) {
              estMs = rHist[0][1] - RACE_START.getTime();
            } else {
              const [km0, t0] = rHist[i - 1], [km1, t1] = rHist[i];
              const frac = km1 > km0 ? (clickedKm - km0) / (km1 - km0) : 0;
              estMs = (t0 + frac * (t1 - t0)) - RACE_START.getTime();
            }
            isActual = true;
            break;
          }
        }
      }
      if (!isActual) estMs = (clickedKm / r.distanceOnTrack) * elapsed;

      const estTime = new Date(RACE_START.getTime() + estMs);
      return { ...r, estMs, estTime, isActual };
    })
    .sort((a, b) => a.estMs - b.estMs);

  const limit = routeRankingFilter === 'top10' ? 10
              : routeRankingFilter === 'top25' ? 25
              : Infinity;
  const shown = passed.slice(0, limit);
  const hasActual = shown.some(r => r.isActual);

  document.getElementById('rrp-km').textContent =
    `Km ${clickedKm.toFixed(1)} · ${passed.length} rijder${passed.length !== 1 ? 's' : ''} gepasseerd${hasActual ? '' : ' (schatting)'}`;

  const el = document.getElementById('rrp-list');
  if (shown.length === 0) {
    el.innerHTML = '<div class="rrp-empty">Nog geen rijders gepasseerd op dit punt</div>';
    return;
  }
  el.innerHTML = shown.map((r, i) => `
    <div class="rrp-row">
      <span class="rrp-rank">${i + 1}</span>
      <span class="rrp-dot" style="background:${r.riderColor || '#888'}"></span>
      <span class="rrp-name">${r.name}</span>
      <span class="rrp-time" title="${r.isActual ? 'Werkelijke doortijd' : 'Schatting o.b.v. gemiddelde snelheid'}">${r.isActual ? '' : '~'}${r.estTime.toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'})}</span>
    </div>`).join('');
}

async function toggleGradient() {
  const btn = document.getElementById('btn-helling');
  const wasActive = btn.classList.contains('active');
  clearOverlay();
  if (wasActive) return;
  if (!SLUG) return;

  btn.textContent = '⛰ Laden…';
  try {
    if (!gradientPts) {
      const r = await fetch(`/${SLUG}/route-gradient.json`);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      gradientPts = await r.json();
    }
    const lines = buildGradientLines(gradientPts);
    gradientLayer = lines;
    lines.forEach(l => l.addTo(map));
    routeSetStyle({ opacity: 0 });
    btn.classList.add('active');
    showLegend(`
      <div class="leg-row"><span class="leg-swatch" style="background:#1e3a8a"></span> Steil dal (&lt; -8%)</div>
      <div class="leg-row"><span class="leg-swatch" style="background:#2563eb"></span> Afdaling (-8 tot -4%)</div>
      <div class="leg-row"><span class="leg-swatch" style="background:#93c5fd"></span> Lichte afdaling (-4 tot -1.5%)</div>
      <div class="leg-row"><span class="leg-swatch" style="background:#4ade80"></span> Vlak (-1.5 tot 1.5%)</div>
      <div class="leg-row"><span class="leg-swatch" style="background:#fde047"></span> Lichte klim (1.5–4%)</div>
      <div class="leg-row"><span class="leg-swatch" style="background:#f97316"></span> Klim (4–8%)</div>
      <div class="leg-row"><span class="leg-swatch" style="background:#ef4444"></span> Steil (&gt; 8%)</div>`);
  } catch(e) {
    console.error('Gradient:', e); clearOverlay();
  }
  btn.textContent = '⛰ Helling';
}

async function toggleSurface() {
  const btn = document.getElementById('btn-surface');
  const wasActive = btn.classList.contains('active');
  clearOverlay();
  if (wasActive) return;
  if (!SLUG) return;

  btn.textContent = '🛣 Laden…';
  try {
    if (!surfacePts) {
      const r = await fetch(`/${SLUG}/route-surface.json`);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      surfacePts = await r.json();
    }
    const lines = buildSurfaceLines(surfacePts);
    surfaceLayer = lines;
    lines.forEach(l => l.addTo(map));
    routeSetStyle({ opacity: 0 });
    btn.classList.add('active');
    showLegend(`
      <div class="leg-row"><span class="leg-swatch" style="background:#4ade80"></span> Verhard (asfalt/beton)</div>
      <div class="leg-row"><span class="leg-swatch" style="background:#b45309; border-top: 1px dashed #b45309;"></span> Onverhard (gravel/dirt/gras)</div>`);
  } catch(e) {
    console.error('Surface:', e); clearOverlay();
  }

function popupHtml(rd) {
  const km       = rd.distanceOnTrack ? rd.distanceOnTrack.toFixed(1) : '—';
  const finished = !rd.scratched && (rd.distanceOnTrack || 0) >= finishKm - 0.5;
  const status   = rd.scratched  ? '<span style="color:#f87171">DNF</span>'
    : finished                   ? '<span style="color:#4ade80">✓ Gefinisht</span>'
                                 : '<span style="color:#4ade80">Rijdend</span>';
  const id       = String(rd.deviceId);
  const hasTrack = !!riderTracks[id];
  return `<div class="pu-name" style="color:${rd.riderColor}">${rd.name}</div>
    <div class="pu-meta">#${rd.teamNumber} · ${km} km · ${status}</div>
    <button class="pu-track-btn${hasTrack ? ' active' : ''}" style="margin-top:8px;width:100%;padding:6px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:${hasTrack?'#4ade80':'#6b7a99'};font-size:11px;cursor:pointer;font-family:inherit" onclick="toggleTrack('${id}')">
      ${hasTrack ? '✕ Verberg gereden route' : '↗ Toon gereden route'}
    </button>`;
}

// ── Leaderboard ────────────────────────────────────────────────────────
let filterText = '';
function filterList() {
  filterText = document.getElementById('search').value.toLowerCase();
  renderList();
}

function renderList() {
  const sorted   = [...riders].sort((a, b) => (b.distanceOnTrack || 0) - (a.distanceOnTrack || 0));
  const filtered = filterText ? sorted.filter(r => r.name.toLowerCase().includes(filterText)) : sorted;
  const el       = document.getElementById('rider-list');
  el.innerHTML   = '';

  function makeRow(rd, rank, badge, extraClass) {
    const row = document.createElement('div');
    row.className = 'rider-row' + (extraClass ? ' ' + extraClass : '');
    row.innerHTML = `
      <span class="r-rank">${rank ?? ''}</span>
      <span class="r-dot" style="background:${rd.riderColor || '#888'}"></span>
      <span class="r-name">${rd.name}</span>
      ${badge}`;
    row.addEventListener('click', () => {
      const m = markerMap[rd.deviceId];
      if (m) { map.setView(m.getLatLng(), 13); m.openPopup(); }
    });
    return row;
  }

  if (filterText) {
    let rank = 0;
    for (const rd of filtered) {
      const fin = !rd.scratched && (rd.distanceOnTrack || 0) >= finishKm - 0.5;
      if (!rd.scratched) rank++;
      const km  = rd.distanceOnTrack ? rd.distanceOnTrack.toFixed(1) : '—';
      const badge = rd.scratched ? '<span class="r-scratch">DNF</span>'
        : fin ? '<span class="r-fin">✓ Fin</span>'
               : `<span class="r-km">${km} km</span>`;
      el.appendChild(makeRow(rd, rd.scratched ? '' : rank, badge, rd.scratched ? 'scratched-row' : ''));
    }
    return;
  }

  const finishers = filtered.filter(r => !r.scratched && (r.distanceOnTrack || 0) >= finishKm - 0.5);
  const active    = filtered.filter(r => !r.scratched && (r.distanceOnTrack || 0) <  finishKm - 0.5);
  const dnf       = filtered.filter(r =>  r.scratched);

  const withTimes = finishers.map(r => {
    const hist = riderHistoryCache?.[String(r.deviceId)];
    let finTs = null;
    if (hist) for (const [km, ts] of hist) { if (km >= finishKm - 0.5) { finTs = ts; break; } }
    return { r, finTs };
  }).sort((a, b) => {
    if (a.finTs && b.finTs) return a.finTs - b.finTs;
    if (a.finTs) return -1;
    if (b.finTs) return 1;
    return (b.r.distanceOnTrack || 0) - (a.r.distanceOnTrack || 0);
  });

  const firstFinTs = withTimes[0]?.finTs ?? null;

  if (withTimes.length > 0) {
    const hdr = document.createElement('div');
    hdr.className = 'section-hdr';
    hdr.innerHTML = `<span>🏆 Gefinisht (${withTimes.length})</span><button class="section-collapse" onclick="toggleFinishers()">${finishersCollapsed ? '▸' : '▾'}</button>`;
    el.appendChild(hdr);

    if (!finishersCollapsed) {
      withTimes.forEach(({ r, finTs }, i) => {
        let badge;
        if (finTs) {
          if (i === 0) {
            const t = new Date(finTs).toLocaleTimeString('nl-NL', { hour:'2-digit', minute:'2-digit', timeZone:'Europe/Amsterdam' });
            badge = `<span class="r-fin">${t}</span>`;
          } else {
            badge = `<span class="r-fin" style="color:var(--muted)">+${durStr(finTs - firstFinTs)}</span>`;
          }
        } else {
          badge = `<span class="r-fin">✓ Fin</span>`;
        }
        el.appendChild(makeRow(r, i + 1, badge, ''));
      });
    }
  }

  if (active.length > 0) {
    const hdr = document.createElement('div');
    hdr.className = 'section-hdr';
    hdr.innerHTML = `<span>Nog onderweg (${active.length})</span>`;
    el.appendChild(hdr);
    const startRank = withTimes.length + 1;
    active.forEach((rd, i) => {
      const km = rd.distanceOnTrack ? rd.distanceOnTrack.toFixed(1) : '—';
      el.appendChild(makeRow(rd, startRank + i, `<span class="r-km">${km} km</span>`, ''));
    });
  }

  if (dnf.length > 0) {
    dnf.forEach(rd => {
      el.appendChild(makeRow(rd, '', '<span class="r-scratch">DNF</span>', 'scratched-row'));
    });
  }
}

// ── Countdown ──────────────────────────────────────────────────────────
function startCountdown() {
  cdSecs = INTERVAL;
  clearInterval(cdTimer);
  cdTimer = setInterval(() => {
    cdSecs--;
    const m = Math.floor(cdSecs / 60), s = cdSecs % 60;
    document.getElementById('refresh-bar').textContent = `↺ ${m}:${String(s).padStart(2,'0')}`;
    if (cdSecs <= 0) { clearInterval(cdTimer); loadPositions().then(startCountdown); }
  }, 1000);
}

// ── Sidebar ────────────────────────────────────────────────────────────
function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  document.getElementById('sidebar').classList.toggle('collapsed', !sidebarOpen);
  setTimeout(() => map.invalidateSize(), 220);
}

document.getElementById('poi-input').addEventListener('keydown', e => { if (e.key === 'Enter') searchPoi(); });

// ── Init ───────────────────────────────────────────────────────────────
async function init() {
  initMap();
  if (!RC) {
    document.getElementById('race-title').textContent = 'Geen race geselecteerd';
    document.getElementById('status-txt').textContent = 'Gebruik ?race=fmc-code in de URL';
    return;
  }
  try {
    const r = await fetch(`${API}/api/fmc/${RC}/config`);
    if (r.ok) {
      raceConfig = await r.json();
      SLUG       = raceConfig.slug || '';
      RACE_START = new Date(raceConfig.start);
      document.title = `${raceConfig.name} — Bomba Tracker`;
      document.getElementById('race-title').textContent = raceConfig.name;
    }
  } catch(e) { console.warn('Config load failed:', e.message); }
  loadRoute();
  loadPositions().then(startCountdown);
}
init();
</script>
