<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bomba Tracker</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    @font-face {
      font-family: 'Backcountry';
      src: url('../fonts/Backcountry.ttf') format('truetype');
      font-weight: normal;
      font-display: swap;
    }
    :root {
      --bg:      #f6e4be;
      --surface: #ffffff;
      --surface2:#fbf2dc;
      --border:  #e3d4ac;
      --text:    #1c2635;
      --muted:   #6b7280;
      --red:     #b90a0a;
      --teal:    #1c2635;   /* accent voor active states → navy in huisstijl */
      --green:   #2e7d32;
      --navy:    #1c2635;
      --cream:   #f6e4be;
      --display: 'Backcountry', 'Arial Narrow', Impact, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text);
      font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 14px; }

    #app { display: flex; height: 100dvh; flex-direction: column; }

    /* ── Header ── */
    #header {
      background: var(--navy);
      padding: 8px 14px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0; gap: 10px; min-height: 48px;
      border-bottom: 3px solid var(--red);
    }
    #hdr-left  { display: flex; align-items: center; gap: 10px; min-width: 0; }
    #hdr-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    #back { font-size: 11px; color: rgba(246,228,190,.6); text-decoration: none; white-space: nowrap; }
    #back:hover { color: var(--cream); }
    #race-title {
      font-family: var(--display);
      font-size: 20px; font-weight: normal; letter-spacing: .02em;
      color: var(--cream); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    #live-badge {
      font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; flex-shrink: 0;
      background: rgba(185,10,10,.2); color: #ff8a8a; border: 1px solid rgba(185,10,10,.5);
      display: flex; align-items: center; gap: 4px;
    }
    .pulse { width: 6px; height: 6px; border-radius: 50%; background: var(--red); animation: pulse 1.4s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }
    #status-txt { font-size: 11px; color: rgba(246,228,190,.55); }
    #sidebar-toggle {
      background: none; border: 1px solid rgba(246,228,190,.3); color: rgba(246,228,190,.8);
      font-size: 11px; padding: 4px 8px; border-radius: 6px; cursor: pointer;
    }
    #sidebar-toggle:hover { color: var(--cream); border-color: rgba(246,228,190,.6); }

    /* ── Body ── */
    #body { display: flex; flex: 1; min-height: 0; }

    /* ── Sidebar ── */
    #sidebar {
      width: 280px; flex-shrink: 0; background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
      transition: width .2s ease;
    }
    #sidebar.collapsed { width: 0; border-right: none; }
    @media (max-width: 640px) {
      #sidebar { position: absolute; top: 48px; left: 0; bottom: 0; z-index: 500; width: 50vw; max-width: 50vw; box-shadow: 4px 0 16px rgba(28,38,53,.25); }
      #sidebar.collapsed { width: 0; }
    }

    /* ── Sidebar top stats ── */
    #sidebar-top { padding: 10px 12px 8px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    #stats-row { display: flex; gap: 6px; margin-bottom: 8px; }
    .stat-pill {
      font-size: 11px; padding: 2px 8px; border-radius: 12px;
      background: var(--surface2); border: 1px solid var(--border); color: var(--muted);
    }
    .stat-pill.active   { color: var(--green); border-color: rgba(74,222,128,.3); }
    .stat-pill.scratched { color: var(--red); border-color: rgba(185,10,10,.3); }

    /* ── Controls bar ── */
    #controls {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      display: flex; flex-wrap: wrap; gap: 6px;
      flex-shrink: 0;
    }
    .ctrl-btn {
      font-size: 11px; padding: 4px 10px; border-radius: 6px; cursor: pointer;
      background: var(--surface2); border: 1px solid var(--border); color: var(--muted);
      text-decoration: none; display: inline-flex; align-items: center; gap: 4px;
      transition: color .12s, border-color .12s, background .12s;
      white-space: nowrap;
    }
    .ctrl-btn:hover { color: var(--text); border-color: var(--muted); }
    .ctrl-btn.active { background: var(--teal); color: var(--cream); border-color: var(--teal); font-weight: 600; }
    .ctrl-btn.disabled { opacity: .4; cursor: not-allowed; pointer-events: none; }

    /* ── Route tabs ── */
    #route-tabs { display: none; padding: 6px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; display: flex; gap: 4px; }
    .tab-btn {
      font-size: 12px; font-weight: 700; padding: 5px 16px; border-radius: 6px; cursor: pointer;
      background: var(--surface2); border: 1px solid var(--border); color: var(--muted);
      transition: color .12s, background .12s, border-color .12s;
    }
    .tab-btn:hover { color: var(--text); border-color: var(--muted); }
    .tab-btn.active { background: var(--teal); color: var(--cream); border-color: var(--teal); }

    /* ── Search ── */
    #search-wrap { padding: 8px 12px 6px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    #search { width: 100%; padding: 6px 10px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 12px; }
    #search:focus { outline: none; border-color: var(--teal); }
    #search::placeholder { color: var(--muted); }

    /* ── Rider list ── */
    #rider-list { flex: 1; overflow-y: auto; }
    .rider-row {
      display: flex; align-items: flex-start; gap: 6px;
      padding: 9px 8px 9px 6px; border-bottom: 1px solid var(--border);
      cursor: pointer; transition: background .1s;
    }
    .rider-row:hover { background: var(--surface2); }
    .rider-row.scratched-row { opacity: .5; }
    .r-rank    { font-size: 11px; font-weight: 700; color: var(--muted); min-width: 16px; text-align: right; flex-shrink: 0; padding-top: 1px; font-variant-numeric: tabular-nums; }
    .r-dot     { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
    .r-info    { flex: 1; min-width: 0; }
    .r-name    { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.25; }
    .r-meta    { font-size: 11px; color: var(--muted); margin-top: 2px; display: flex; flex-wrap: wrap; gap: 6px; align-items: baseline; }
    .r-km      { color: var(--muted); font-variant-numeric: tabular-nums; }
    .r-scratch { color: var(--red); font-weight: 600; }
    .r-fin     { font-weight: 700; color: var(--green); }

    /* ── Map ── */
    #map { flex: 1; min-width: 0; position: relative; }
    .leaflet-container { background: #e8eef0; }

    #refresh-bar {
      position: absolute; bottom: 10px; right: 10px; z-index: 800;
      background: rgba(255,255,255,.9); border: 1px solid var(--border);
      border-radius: 6px; padding: 4px 10px; font-size: 11px; color: var(--muted);
      pointer-events: none;
    }
    #race-clock {
      position: absolute; top: 10px; right: 10px; z-index: 800;
      background: rgba(255,255,255,.94); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 12px; min-width: 144px;
      box-shadow: 0 2px 8px rgba(28,38,53,.15);
      font-variant-numeric: tabular-nums; pointer-events: none;
    }
    #race-clock .rc-timer { font-family: var(--display); font-size: 20px; color: var(--red); line-height: 1; letter-spacing: .02em; }
    #race-clock .rc-label { font-size: 9px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-top: 2px; }
    #race-clock .rc-times { margin-top: 7px; padding-top: 7px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 3px; font-size: 12px; color: var(--text); }
    #race-clock .rc-time { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; }
    #race-clock .rc-time span { color: var(--muted); font-size: 11px; }
    #race-clock .rc-time b { font-weight: 600; }
    #race-clock .rc-time small { color: var(--muted); font-size: 10px; font-weight: 400; margin-left: 3px; }
    @media (max-width: 640px) {
      #race-clock { top: 8px; right: 8px; padding: 6px 9px; min-width: 0; }
      #race-clock .rc-timer { font-size: 16px; }
    }
    /* Fullscreen-kaart */
    #map:fullscreen, #map:-webkit-full-screen { width: 100%; height: 100%; }
    #map.map-fullscreen {
      position: fixed; inset: 0; z-index: 9999;
      width: 100% !important; height: 100% !important;
    }
    #map-fs-close {
      position: absolute; top: 10px; left: 10px; z-index: 1000;
      width: 38px; height: 38px; border-radius: 8px;
      border: 1px solid var(--border); background: rgba(255,255,255,.94);
      color: var(--text); font-size: 18px; line-height: 1; cursor: pointer;
      box-shadow: 0 2px 8px rgba(28,38,53,.2);
    }
    #map-fs-close:hover { border-color: var(--muted); }

    /* ── Rider name labels ── */
    .rider-label {
      background: none !important; border: none !important; box-shadow: none !important;
      padding: 0 !important;
    }
    .rider-label::before { display: none !important; }
    .rl-inner {
      font-size: 11px; font-weight: 700; color: #fff;
      background: rgba(28,38,53,.85); padding: 2px 5px;
      border-radius: 2px; white-space: nowrap; pointer-events: none;
      text-shadow: 0 1px 2px rgba(0,0,0,.9);
    }

    /* ── Label visibility ── */
    .labels-hidden .rider-label { display: none !important; }

    /* ── Sidebar section headers ── */
    .section-hdr {
      padding: 5px 12px 4px; font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .08em;
      color: var(--muted); background: var(--surface2);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .section-collapse {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 13px; padding: 0 4px; font-family: inherit;
    }
    .section-collapse:hover { color: var(--text); }

    /* ── Overlay legend ── */
    #overlay-legend {
      display: none;
      position: absolute; bottom: 40px; left: 10px; z-index: 800;
      background: rgba(255,255,255,.95); border: 1px solid var(--border);
      border-radius: 6px; padding: 7px 10px; font-size: 10px;
      pointer-events: none; line-height: 1.6;
    }
    .leg-row { display: flex; align-items: center; gap: 5px; }
    .leg-swatch { width: 16px; height: 4px; border-radius: 2px; flex-shrink: 0; }

    /* ── Route Ranking Panel ── */
    #route-rank-panel {
      position: absolute; top: 10px; left: 10px; z-index: 800;
      background: rgba(255,255,255,.97); border: 1px solid var(--border);
      border-radius: 10px; width: 260px; max-height: calc(100% - 20px);
      display: flex; flex-direction: column; overflow: hidden;
      box-shadow: 0 4px 24px rgba(28,38,53,.25);
    }
    #rrp-header { padding: 10px 12px 8px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    #rrp-km { font-size: 11px; color: var(--teal); font-weight: 700; margin-bottom: 6px; }
    #rrp-filters { display: flex; gap: 4px; align-items: center; }
    .rrp-btn {
      font-size: 10px; padding: 3px 8px; border-radius: 5px; cursor: pointer;
      background: var(--surface2); border: 1px solid var(--border); color: var(--muted);
      transition: color .1s, background .1s, border-color .1s;
    }
    .rrp-btn.active { background: var(--teal); color: var(--cream); border-color: var(--teal); font-weight: 700; }
    #rrp-close { margin-left: auto; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 0 2px; line-height: 1; }
    #rrp-close:hover { color: var(--text); }
    #rrp-list { flex: 1; overflow-y: auto; }
    .rrp-row {
      display: flex; align-items: center; gap: 7px;
      padding: 6px 12px; border-bottom: 1px solid rgba(30,45,74,.5); font-size: 12px;
    }
    .rrp-rank { font-size: 10px; color: var(--muted); width: 18px; text-align: right; flex-shrink: 0; }
    .rrp-dot  { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .rrp-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .rrp-time { font-size: 10px; color: var(--teal); flex-shrink: 0; font-weight: 600; }
    .rrp-empty { padding: 20px 12px; font-size: 12px; color: var(--muted); text-align: center; }
    @media (max-width: 640px) {
      #route-rank-panel { top: auto; bottom: 40px; left: 4px; right: 4px; width: auto; max-height: 50vh; }
    }
    .map-crosshair { cursor: crosshair !important; }

    /* ── POI search panel ── */
    #poi-section { border-bottom: 1px solid var(--border); flex-shrink: 0; }
    #poi-toggle {
      width: 100%; padding: 8px 12px;
      display: flex; align-items: center; justify-content: space-between;
      background: none; border: none; cursor: pointer;
      font-size: 11px; color: var(--muted); font-family: inherit;
    }
    #poi-toggle:hover { color: var(--text); }
    #poi-body { display: none; padding: 8px 12px 10px; }
    #poi-body.open { display: block; }
    #poi-row { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 6px; }
    #poi-input {
      flex: 1 1 100%; padding: 7px 10px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); font-size: 12px; font-family: inherit;
    }
    #poi-input::placeholder { color: var(--muted); }
    #poi-input:focus { outline: none; border-color: var(--teal); }
    #poi-dist {
      flex: 1; padding: 7px 6px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; color: var(--muted); font-size: 12px; cursor: pointer;
    }
    #poi-btn {
      flex: 2; padding: 7px 12px;
      background: var(--teal); border: none; border-radius: 6px;
      color: var(--cream); font-size: 12px; font-weight: 700; cursor: pointer;
    }
    #poi-status { font-size: 10px; color: var(--muted); margin-bottom: 4px; min-height: 14px; }
    #poi-layers { display: flex; flex-direction: column; gap: 3px; }
    .poi-layer {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; padding: 4px 6px;
      background: var(--surface2); border-radius: 4px; border: 1px solid var(--border);
    }
    .poi-dot  { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .poi-lbl  { flex: 1; color: var(--text); }
    .poi-cnt  { font-size: 10px; color: var(--muted); }
    .poi-vis, .poi-rm { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 12px; padding: 0 2px; }
    .poi-vis:hover, .poi-rm:hover { color: var(--text); }

    /* ── Results modal ── */
    #results-modal {
      position: fixed; inset: 0; z-index: 2000;
      background: rgba(0,0,0,.7); display: flex; align-items: center; justify-content: center;
    }
    #results-inner {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      width: min(95vw, 680px); max-height: 90vh; display: flex; flex-direction: column;
      overflow: hidden; box-shadow: 0 8px 40px rgba(0,0,0,.7);
    }
    #results-hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    #results-hdr-title { font-family: var(--display); font-size: 18px; font-weight: normal; letter-spacing: .03em; color: var(--navy); }
    #results-close {
      background: none; border: none; color: var(--muted); font-size: 18px;
      cursor: pointer; padding: 0 4px; line-height: 1;
    }
    #results-close:hover { color: var(--text); }
    #results-body { flex: 1; overflow-y: auto; padding: 0; }
    .res-section-hdr {
      padding: 7px 16px 5px; font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: var(--muted); background: var(--surface2);
      border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1;
    }
    .res-row {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 16px; border-bottom: 1px solid rgba(30,45,74,.4); font-size: 12px;
    }
    .res-pos  { font-size: 11px; color: var(--muted); width: 24px; text-align: right; flex-shrink: 0; font-weight: 700; }
    .res-pos.gold   { color: #f0c040; }
    .res-pos.silver { color: #aabbc8; }
    .res-pos.bronze { color: #cd7f32; }
    .res-name { flex: 1; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .res-time { font-size: 11px; color: var(--green); font-weight: 700; flex-shrink: 0; font-variant-numeric: tabular-nums; }
    .res-gap  { font-size: 11px; color: var(--muted); flex-shrink: 0; font-variant-numeric: tabular-nums; }
    .res-near { font-size: 11px; color: #f0a500; flex-shrink: 0; }
    .res-note {
      padding: 10px 16px 12px; font-size: 11px; color: var(--muted);
      border-top: 1px solid var(--border); line-height: 1.5;
    }

    /* ── Race Flow modal ── */
    #raceflow-modal {
      position: fixed; inset: 0; z-index: 2000;
      background: rgba(0,0,0,.7); display: flex; align-items: center; justify-content: center;
    }
    #raceflow-inner {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      width: min(95vw, 760px); max-height: 90vh; display: flex; flex-direction: column;
      overflow: hidden; box-shadow: 0 8px 40px rgba(0,0,0,.7);
    }
    #raceflow-hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0;
      font-family: var(--display); font-size: 18px; font-weight: normal; letter-spacing: .03em; color: var(--navy);
    }
    #raceflow-hdr select {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--muted); font-size: 11px; padding: 3px 6px; border-radius: 4px; cursor: pointer;
    }
    #raceflow-close {
      background: none; border: none; color: var(--muted); font-size: 18px;
      cursor: pointer; padding: 0 4px; line-height: 1;
    }
    #raceflow-close:hover { color: var(--text); }
    #raceflow-canvas { flex: 1; display: block; min-height: 0; width: 100%; cursor: grab; }
    #raceflow-canvas.dragging { cursor: grabbing; }
    #raceflow-toolbar {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .rf-tb-btn {
      font-size: 10px; padding: 3px 8px; border-radius: 4px; cursor: pointer;
      background: var(--surface2); border: 1px solid var(--border); color: var(--muted);
    }
    .rf-tb-btn:hover, .rf-tb-btn.active { background: var(--teal); color: var(--cream); border-color: var(--teal); font-weight: 700; }
    .rf-tb-sep { width: 1px; height: 16px; background: var(--border); margin: 0 2px; }
    #rf-zoom-hint { font-size: 10px; color: var(--muted); margin-left: auto; }
    #raceflow-legend {
      display: flex; flex-wrap: wrap; gap: 8px;
      padding: 8px 16px; border-top: 1px solid var(--border); flex-shrink: 0;
      font-size: 10px;
    }
    .rf-leg-item { display: flex; align-items: center; gap: 4px; }
    .rf-leg-dot  { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    #raceflow-status { padding: 8px 16px; font-size: 12px; color: var(--muted); text-align: center; }

    /* ── Popups ── */
    .leaflet-popup-content-wrapper { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); box-shadow: 0 4px 20px rgba(28,38,53,.2); }
    .leaflet-popup-tip { background: var(--surface); border: 1px solid var(--border); }
    .leaflet-popup-content { margin: 10px 14px; font-size: 13px; }
    .pu-name { font-weight: 700; margin-bottom: 4px; }
    .pu-meta { font-size: 11px; color: var(--muted); }
    .pu-stats { margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 4px; }
    .pu-stat { display: flex; align-items: center; justify-content: space-between; gap: 12px; font-size: 11px; color: var(--muted); }
    .pu-stat b { color: var(--text); font-size: 12px; white-space: nowrap; }
    .cp-label { background: var(--navy) !important; border: none !important; box-shadow: none !important; color: var(--cream) !important; font-size: 10px !important; font-weight: 700 !important; white-space: nowrap; padding: 2px 6px !important; border-radius: 3px; }
    .cp-label::before { display: none !important; }
  </style>
</head>
<body>
<div id="app">

  <div id="header">
    <div id="hdr-left">
      <a id="back" href="../bomba/index.html">← Bomba</a>
      <div id="race-title">Laden…</div>
      <div id="live-badge"><span class="pulse"></span>Live</div>
    </div>
    <div id="hdr-right">
      <span id="status-txt">Loading…</span>
      <button id="sidebar-toggle" onclick="toggleSidebar()">☰ Klassement</button>
    </div>
  </div>

  <div id="body">
    <div id="sidebar">

      <div id="sidebar-top">
        <div id="stats-row">
          <span class="stat-pill active"    id="pill-active">— rijdend</span>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
'use strict';
const API      = 'https://tracker.klikschaak.nl';
const RC       = new URLSearchParams(location.search).get('race') || '';
const INTERVAL = 300;

let SLUG       = '';
let raceConfig = null;
let RACE_START = new Date();

let map, routeLayer;
let markerMap   = {};
let riders      = [];
let finishKm    = Infinity;
let mapCentered = false;
let sidebarOpen = window.innerWidth > 640;
let cdSecs = INTERVAL, cdTimer;

let routePts      = [];
let routeCum      = [];
let gradientLayer = null;
let surfaceLayer  = null;

// ── Map ────────────────────────────────────────────────────────────────
function initMap() {
  map = L.map('map', { zoomControl: false }).setView([48, 10], 5);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://openstreetmap.org/copyright">OpenStreetMap</a>', maxZoom: 19
  }).addTo(map);
  L.control.zoom({ position: 'bottomright' }).addTo(map);
  map.on('zoomend', updateLabelVisibility);
  map.on('click', function(e) {
    if (!routeRankingMode || !routePts.length) return;
    const nearest = nearestRoutePt(e.latlng.lat, e.latlng.lng);
    if (nearest.dist > 10) return;
    if (selectedRouteMarker) selectedRouteMarker.remove();
    selectedRouteMarker = L.circleMarker(routePts[nearest.idx], {
      radius: 9, color: '#ffbc00', fillColor: '#ffbc00', fillOpacity: 1, weight: 2, pane: 'markerPane'
    }).addTo(map);
    showRouteRanking(nearest.km);
  });
  document.getElementById('sidebar').classList.toggle('collapsed', !sidebarOpen);
  setTimeout(() => map.invalidateSize(), 250);
}

// ── Haversine ──────────────────────────────────────────────────────────
function hav([la1,lo1],[la2,lo2]) {
  const R = 6371, r = Math.PI/180;
  const a = Math.sin((la2-la1)*r/2)**2 + Math.cos(la1*r)*Math.cos(la2*r)*Math.sin((lo2-lo1)*r/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ── Route + Checkpoints ────────────────────────────────────────────────
function routeSetStyle(opts) { if (routeLayer) routeLayer.forEach(l => l.setStyle(opts)); }

async function loadRoute() {
  if (!SLUG && !raceConfig?.routeFile) return;

  try {
    if (raceConfig?.routeFile) {
      // GeoJSON route via FMC API (e.g. Seven Serpents)
      const r = await fetch(`${API}/api/fmc/${RC}/route?f=${raceConfig.routeFile}`);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const geojson = await r.json();
      if (routeLayer) routeLayer.forEach(l => l.remove());
      routeLayer = [L.geoJSON(geojson, {
        style: { color: '#b90a0a', weight: 4, opacity: .85 },
        coordsToLatLng: c => L.latLng(parseFloat(c[1]), parseFloat(c[0]))
      }).addTo(map)];
      const pts = [];
      for (const feat of (geojson.features || [])) {
        const geom  = feat.geometry;
        const lines = geom.type === 'MultiLineString' ? geom.coordinates : [geom.coordinates];
        for (const line of lines) for (const c of line) pts.push([parseFloat(c[1]), parseFloat(c[0])]);
      }
      const step = Math.max(1, Math.floor(pts.length / 2000));
      routePts = pts.filter((_, i) => i % step === 0);
    } else {
      // Komoot route: load via API server (avoids GitHub Pages path prefix issues)
      const [rr, sr] = await Promise.all([
        fetch(`${API}/${SLUG}/route.json`),
        fetch(`${API}/${SLUG}/route-segments.json`)
      ]);
      if (!rr.ok) throw new Error(`HTTP ${rr.status}`);
      routePts = await rr.json();
      if (routeLayer) routeLayer.forEach(l => l.remove());
      const segs = sr.ok ? await sr.json() : null;
      if (segs && segs.length > 1) {
        routeLayer = segs.map(s =>
          L.polyline(routePts.slice(s.from, s.to + 1), { color: '#b90a0a', weight: 4, opacity: .85 }).addTo(map)
        );
      } else {
        routeLayer = [L.polyline(routePts, { color: '#b90a0a', weight: 4, opacity: .85 }).addTo(map)];
      }
    }

    routeCum = [0];
    for (let i = 1; i < routePts.length; i++)
      routeCum.push(routeCum[i-1] + hav(routePts[i-1], routePts[i]));
    finishKm = routeCum[routeCum.length - 1]; // werkelijke routelengte als finish

    // Fit kaart op de route — alleen als riders nog niet geladen zijn (anders al gecentreerd op leider)
    if (!mapCentered && routeLayer && routeLayer[0]) {
      try { map.fitBounds(routeLayer[0].getBounds(), { padding: [30, 30] }); } catch(e) {}
    }
  } catch(e) { console.warn('Route load failed:', e.message); }

  // Checkpoints (only available for Komoot routes)
  if (!raceConfig?.routeFile) {
    try {
      const r = await fetch(`${API}/${SLUG}/checkpoints.json`);
      if (!r.ok) return;
      const cps = await r.json();
      cps.forEach(cp => {
        const isFinish = cp.label === 'Finish' || cp.label === 'FINISH';
        const isStart  = cp.label === 'Start'  || cp.label === 'START';
        const color    = isFinish ? '#2e7d32' : isStart ? '#b45309' : '#1c2635';
        L.circleMarker([cp.lat, cp.lon], {
          radius: 7, color, fillColor: color, fillOpacity: 1, weight: 2
        }).addTo(map).bindTooltip(cp.label, { permanent: true, direction: 'top',
          className: 'cp-label', offset: [0, -8] });
      });
    } catch(e) { console.warn('Checkpoints load failed:', e.message); }
  }
}

// ── Positions ──────────────────────────────────────────────────────────
async function loadPositions() {
  try {
    const r = await fetch(`${API}/api/fmc/${RC}/positions?_=${Date.now()}`);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    allRiders = await r.json();
    // Tab-filter toepassen indien van toepassing, anders alle riders tonen
    const tabs = raceConfig?.tabs;
    if (tabs?.length) {
      const segs = tabs[activeTab].segments;
      riders = segs ? allRiders.filter(r => segs.includes(r.segment)) : allRiders;
    } else {
      riders = allRiders;
    }
    // finishKm wordt uitsluitend gezet door loadRoute() op basis van werkelijke routelengte.
    // Geen fallback op max-positie om te voorkomen dat de leider als gefinisht wordt getoond.
    renderMarkers();
    updateLabelVisibility();
    renderList();
    if (!riderHistoryCache) {
      fetch(`${API}/api/fmc/${RC}/history`)
        .then(r => r.ok ? r.json() : null)
        .then(data => { if (data) { riderHistoryCache = data; renderList(); } })
        .catch(() => {});
    }
    if (!mapCentered) {
      const leader = riders.filter(r => !r.scratched && r.latitude && r.longitude && r.distanceOnTrack > 0)
                           .sort((a, b) => (b.distanceOnTrack || 0) - (a.distanceOnTrack || 0))[0];
      if (leader) {
        setViewLeaderLow([leader.latitude, leader.longitude], 11);
        mapCentered = true;
      }
    }
    const finished  = riders.filter(r => !r.scratched && r.distanceOnTrack >= finishKm - 0.5).length;
    const active    = riders.filter(r => !r.scratched && r.distanceOnTrack  < finishKm - 0.5).length;
    const scratched = riders.filter(r =>  r.scratched).length;
    document.getElementById('pill-active').textContent  = `${finished} fin · ${active} rijdend`;
    document.getElementById('pill-scratch').textContent = `${scratched} DNF`;
    document.getElementById('status-txt').textContent   =
      `${riders.length} riders · ${new Date().toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'})}`;
  } catch(e) {
    document.getElementById('status-txt').textContent = 'Error: ' + e.message;
  }
}

// ── Markers ────────────────────────────────────────────────────────────
function renderMarkers() {
  const seen = new Set();

  for (const rd of riders) {
    const id = String(rd.deviceId);
    seen.add(id);
    const color   = rd.riderColor || '#888';
    const opacity = rd.scratched ? 0.3 : 0.9;

    if (markerMap[id]) {
      markerMap[id]
        .setLatLng([rd.latitude, rd.longitude])
        .setStyle({ color, fillColor: color, opacity, fillOpacity: opacity });
    } else {
      const firstName = rd.name.split(' ')[0];
      const m = L.circleMarker([rd.latitude, rd.longitude], {
        radius: rd.scratched ? 4 : 6, color, fillColor: color,
        fillOpacity: opacity, opacity, weight: 1.5
      }).addTo(map).bindPopup(() => popupHtml(riders.find(r => String(r.deviceId) === id) || rd));

      if (!rd.scratched) {
        m.bindTooltip(`<span class="rl-inner">${firstName}</span>`, {
          permanent: true, direction: 'right', offset: [7, 0],
          className: 'rider-label', opacity: 1
        });
      }
      markerMap[id] = m;
    }
  }
  for (const id of Object.keys(markerMap)) {
    if (!seen.has(id)) { markerMap[id].remove(); delete markerMap[id]; }
  }
}

function updateLabelVisibility() {
  const anyTrackActive = Object.keys(riderTracks).length > 0;
  const show = labelsVisible && !anyTrackActive;
  if (map) map.getContainer().classList.toggle('labels-hidden', !show);
  const btn = document.getElementById('btn-labels');
  if (btn) btn.classList.toggle('active', labelsVisible);
}

function toggleLabels() {
  labelsVisible = !labelsVisible;
  updateLabelVisibility();
}

function toggleFinishers() {
  finishersCollapsed = !finishersCollapsed;
  renderList();
}

// ── Gradient overlay ───────────────────────────────────────────────────
const GRAD_STOPS = [
  [-8,       '#1e3a8a'],
  [-4,       '#2563eb'],
  [-1.5,     '#93c5fd'],
  [ 1.5,     '#4ade80'],
  [ 4,       '#fde047'],
  [ 8,       '#f97316'],
  [12,       '#ef4444'],
  [Infinity, '#111827'],
];
function gradColor(pct) {
  for (const [max, col] of GRAD_STOPS) if (pct < max) return col;
  return '#111827';
}

function buildGradientLines(gradPts) {
  // Smooth elevations over a small window to reduce GPS/elevation noise
  const sm = gradPts.map((p, i) => {
    const s = Math.max(0, i - 2), e = Math.min(gradPts.length - 1, i + 2);
    let sum = 0, n = 0;
    for (let j = s; j <= e; j++) { sum += gradPts[j][2]; n++; }
    return [p[0], p[1], sum / n];
  });

  // Draw line segments between consecutive gradient points, coloured by slope.
  // Uses the gradient data's own coordinates → independent of routePts density.
  const lines = [];
  let col = null, seg = [];
  for (let i = 0; i < sm.length - 1; i++) {
    const distKm = hav([sm[i][0], sm[i][1]], [sm[i+1][0], sm[i+1][1]]);
    const grad   = distKm > 0.02 ? (sm[i+1][2] - sm[i][2]) / (distKm * 10) : 0;
    const c      = gradColor(grad);
    const a = [sm[i][0], sm[i][1]], b = [sm[i+1][0], sm[i+1][1]];
    if (c !== col) {
      if (seg.length >= 2)
        lines.push(L.polyline(seg, { color: col, weight: 5, opacity: .85, lineJoin: 'round', lineCap: 'butt' }));
      col = c; seg = [a, b];
    } else {
      seg.push(b);
    }
  }
  if (seg.length >= 2)
    lines.push(L.polyline(seg, { color: col, weight: 5, opacity: .85, lineJoin: 'round' }));
  return lines;
}

// ── Surface overlay ────────────────────────────────────────────────────
// Twee dataformaten ondersteund:
//   • Oud: array van 0/1 (verhard/onverhard), 1:1 geïndexeerd op routePts
//   • Nieuw: array van [lat, lon, unpaved] (zelf-bevattend, density-onafhankelijk)
function buildSurfaceLines(surf) {
  if (!surf.length) return [];
  const selfContained = Array.isArray(surf[0]);
  const coordAt = i => selfContained ? [surf[i][0], surf[i][1]] : (routePts[i] ? [routePts[i][0], routePts[i][1]] : null);
  const unpavedAt = i => selfContained ? surf[i][2] === 1 : surf[i] === 1;
  const len = selfContained ? surf.length : Math.min(routePts.length, surf.length);

  const PAVED   = { color: '#2e7d32', weight: 5, opacity: .9, lineJoin: 'round', lineCap: 'round' };
  const UNPAVED = { color: '#b45309', weight: 5, opacity: .9, dashArray: '8 5', lineJoin: 'round', lineCap: 'round' };

  // Teken aaneengesloten segmenten van beide typen (groen=verhard, bruin gestreept=onverhard)
  const lines = [];
  let seg = [], segUnpaved = null;
  for (let i = 0; i < len; i++) {
    const pt = coordAt(i);
    if (!pt) continue;
    const u = unpavedAt(i);
    if (segUnpaved === null) { segUnpaved = u; seg = [pt]; }
    else if (u === segUnpaved) { seg.push(pt); }
    else {
      seg.push(pt); // overgangspunt delen → geen gaten
      if (seg.length >= 2) lines.push(L.polyline(seg, segUnpaved ? UNPAVED : PAVED));
      seg = [pt]; segUnpaved = u;
    }
  }
  if (seg.length >= 2) lines.push(L.polyline(seg, segUnpaved ? UNPAVED : PAVED));
  return lines;
}

function showLegend(html) {
  const el = document.getElementById('overlay-legend');
  el.innerHTML = html; el.style.display = 'block';
}
function hideLegend() { document.getElementById('overlay-legend').style.display = 'none'; }

function clearOverlay() {
  if (gradientLayer) { gradientLayer.forEach(l => l.remove()); gradientLayer = null; }
  if (surfaceLayer)  { surfaceLayer.forEach(l => l.remove());  surfaceLayer  = null; }
  routeSetStyle({ opacity: .85 });
  document.getElementById('btn-helling').classList.remove('active');
  document.getElementById('btn-surface').classList.remove('active');
  hideLegend();
}

let gradientPts = null;
let surfacePts  = null;

// ── Rider Tracks ───────────────────────────────────────────────────────
const riderTracks = {};

function durStr(ms) {
  if (!ms || ms < 60000) return '—';
  const m = Math.floor(ms / 60000), h = Math.floor(m / 60);
  return h > 0 ? `${h}u ${String(m % 60).padStart(2,'0')}m` : `${m}m`;
}

function drawHourMarkers(pts) {
  const markers = [], timed = pts.filter(p => p[2]);
  if (timed.length < 2) return markers;
  const t0 = timed[0][2], t1 = timed[timed.length-1][2];
  for (let t = Math.ceil(t0/3600000)*3600000; t <= t1; t += 3600000) {
    let best = null, bestDiff = Infinity;
    for (const p of timed) {
      const d = Math.abs(p[2] - t);
      if (d < bestDiff) { bestDiff = d; best = p; }
    }
    if (!best || bestDiff > 35*60000) continue;
    const label = new Date(t).toLocaleTimeString('nl-NL', { hour:'2-digit', minute:'2-digit', timeZone:'Europe/Amsterdam' });
    const icon = L.divIcon({ className: 'poi-icon',
      html: `<div style="background:#fff;border:1.5px solid #2e7d32;border-radius:3px;padding:1px 5px;font-size:10px;font-weight:700;color:#2e7d32;white-space:nowrap;line-height:15px;box-shadow:0 1px 4px rgba(28,38,53,.25)">${label}</div>`,
      iconAnchor: [0, 8], iconSize: null });
    markers.push(L.marker([best[0], best[1]], { icon, interactive: false }).addTo(map));
  }
  return markers;
}

function extractStopsFromTrack(pts) {
  const stops = [], timed = pts.filter(p => p[2]);
  for (let i = 0; i < timed.length - 1; i++) {
    const gap = timed[i+1][2] - timed[i][2];
    if (gap > 10*60000)
      stops.push({ lat: timed[i][0], lon: timed[i][1], startMs: timed[i][2], durationMs: gap });
  }
  return stops;
}

function drawStopMarkers(stops) {
  return stops.map(s => {
    const dur  = durStr(s.durationMs);
    const time = new Date(s.startMs).toLocaleTimeString('nl-NL', { hour:'2-digit', minute:'2-digit', timeZone:'Europe/Amsterdam' });
    const icon = L.divIcon({ className: 'poi-icon',
      html: `<div style="background:#fff;border:2px solid #b45309;border-radius:4px;padding:3px 7px;font-size:11px;font-weight:700;color:#b45309;white-space:nowrap;line-height:16px;box-shadow:0 2px 6px rgba(28,38,53,.3)">${dur}<br><span style="font-weight:400;font-size:10px;opacity:.9">${time}</span></div>`,
      iconAnchor: [0, 8], iconSize: null });
    return L.marker([s.lat, s.lon], { icon, interactive: false }).addTo(map);
  });
}

async function toggleTrack(id) {
  if (riderTracks[id]) {
    riderTracks[id].line.remove();
    riderTracks[id].hourMarkers.forEach(m => m.remove());
    riderTracks[id].stopMarkers.forEach(m => m.remove());
    delete riderTracks[id];
  } else {
    try {
      const res = await fetch(`${API}/api/fmc/${RC}/track/${id}`);
      const pts = await res.json();
      if (pts.length > 1) {
        const line = L.polyline(pts.map(p => [p[0], p[1]]), {
          color: '#2e7d32', weight: 3, opacity: .9, lineJoin: 'round', lineCap: 'round'
        }).addTo(map);
        const hourMarkers = drawHourMarkers(pts);
        const stopMarkers = drawStopMarkers(extractStopsFromTrack(pts));
        riderTracks[id] = { line, hourMarkers, stopMarkers };
        map.fitBounds(line.getBounds(), { padding: [40, 40], maxZoom: 14 });
      }
    } catch(e) { console.error('Track error:', e); }
  }
  updateLabelVisibility();
  const rd = riders.find(r => String(r.deviceId) === id);
  if (rd && markerMap[rd.deviceId]) markerMap[rd.deviceId].setPopupContent(popupHtml(rd));
}

const POI_COLORS = ['#f59e0b','#38bdf8','#a78bfa','#fb7185','#34d399','#f97316','#e879f9','#facc15'];
const poiLayers  = {};
let   poiColorIdx = 0;

function togglePoi() {
  const body = document.getElementById('poi-body');
  const open = body.classList.toggle('open');
  document.getElementById('poi-arrow').textContent = open ? '▾' : '▸';
  document.getElementById('btn-poi').classList.toggle('active', open);
}

function togglePoiPanel() { togglePoi(); }

async function searchPoi() {
  const q       = document.getElementById('poi-input').value.trim();
  const maxdist = document.getElementById('poi-dist').value;
  const status  = document.getElementById('poi-status');
  if (!q) return;
  const key = `${q}|${maxdist}km`;
  if (poiLayers[key]) { status.textContent = 'Al geladen — zie laag hieronder.'; return; }
  status.textContent = '⏳ Zoeken…';
  document.getElementById('poi-btn').disabled = true;
  try {
    const res = await fetch(`${API}/api/fmc/${RC}/poi?q=${encodeURIComponent(q)}&maxdist=${maxdist}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const pts  = data.results ?? data;
    const errs = data.errors ?? [];
    if (!pts.length && !errs.length) { status.textContent = `Niets gevonden voor "${q}".`; return; }
    if (pts.length) {
      const color = POI_COLORS[poiColorIdx++ % POI_COLORS.length];
      const icon  = L.divIcon({
        className: 'poi-icon',
        html: `<div style="width:16px;height:16px;border-radius:50%;background:${color};border:2px solid #fff;box-shadow:0 2px 5px rgba(28,38,53,.25)"></div>`,
        iconSize: [16,16], iconAnchor: [8,8], popupAnchor: [0,-10]
      });
      const markers = pts.map(p => L.marker([p.lat, p.lon], { icon })
        .addTo(map)
        .bindPopup(`<b style="color:${color}">${p.name}</b>${p.address ? '<br><small>'+p.address+'</small>' : ''}`));
      poiLayers[key] = { markers, visible: true, color, label: q, count: pts.length };
      renderPoiLayers();
    }
    status.textContent = pts.length
      ? `✓ ${pts.length} resultaten${errs.length ? ` (⚠ ${errs.length} zones mislukt)` : ''}`
      : `⚠ Alle zones mislukt — probeer opnieuw`;
  } catch(e) {
    status.textContent = `Fout: ${e.message}`;
  } finally {
    document.getElementById('poi-btn').disabled = false;
  }
}

function renderPoiLayers() {
  document.getElementById('poi-layers').innerHTML = Object.entries(poiLayers).map(([key, l]) => `
    <div class="poi-layer">
      <div class="poi-dot" style="background:${l.color};opacity:${l.visible?1:.35}"></div>
      <span class="poi-lbl">${l.label}</span>
      <span class="poi-cnt">${l.count}</span>
      <button class="poi-vis" onclick="togglePoiLayer('${key}')">${l.visible?'👁':'○'}</button>
      <button class="poi-rm"  onclick="removePoiLayer('${key}')">✕</button>
    </div>`).join('');
}

function togglePoiLayer(key) {
  const l = poiLayers[key]; if (!l) return;
  l.visible = !l.visible;
  l.markers.forEach(m => l.visible ? m.addTo(map) : m.remove());
  renderPoiLayers();
}

function removePoiLayer(key) {
  const l = poiLayers[key]; if (!l) return;
  l.markers.forEach(m => m.remove());
  delete poiLayers[key];
  renderPoiLayers();
}

function fmtElapsed(secs) {
  const h = Math.floor(secs / 3600), m = Math.floor((secs % 3600) / 60);
  return `${h}u ${String(m).padStart(2,'0')}m`;
}
function fmtGap(secs) {
  const h = Math.floor(secs / 3600), m = Math.floor((secs % 3600) / 60);
  return h > 0 ? `+${h}u${String(m).padStart(2,'0')}` : `+${m}m`;
}

function renderResults() {
  const body = document.getElementById('results-body');

                         : `<span class="res-gap">${fmtGap(f.elapsed - winnerElapsed)}</span>`;
    html += `<div class="res-row">
      <span class="res-pos ${posClass(i)}">${i + 1}</span>
      <span class="res-name">${f.name}</span>

  });

  if (nearFinishers?.length) {
    html += `<div class="res-section-hdr">Mogelijk gefinisht — data eindigt voor finish (${nearFinishers.length})</div>`;
    nearFinishers.forEach(f => {

    });

  html += `<div class="res-note">⚠ Reconstructie op basis van GPS-history. Eerste 6u50 niet opgeslagen — rijafstanden zijn onderschattingen. Laatste datapunt: ${new Date(resultsData.dataEnd).toLocaleString('nl-NL', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit', timeZone:'Europe/Amsterdam' })}.</div>`;

// ── Race Flow ──────────────────────────────────────────────────────────
let rfData = null;
let rfViewMs = null; // { minMs, maxMs } — null = alles

function openRaceFlow() {
  document.getElementById('raceflow-modal').style.display = 'flex';
  loadRaceFlow();
}
function closeRaceFlow() { document.getElementById('raceflow-modal').style.display = 'none'; }

async function loadRaceFlow() {
  const count  = document.getElementById('rf-count').value;
  const status = document.getElementById('raceflow-status');
  const legend = document.getElementById('raceflow-legend');
  status.textContent = '⏳ Laden…'; legend.innerHTML = '';
  try {
    const res = await fetch(`${API}/api/fmc/${RC}/raceflow?count=${count}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    rfData = await res.json();
    if (!rfData.riders?.length) { status.textContent = 'Nog geen data beschikbaar.'; return; }
    status.textContent = '';
    rfViewMs = null;
    drawRaceFlowChart(rfData);
    legend.innerHTML = rfData.riders.map(r =>
      `<div class="rf-leg-item"><div class="rf-leg-dot" style="background:${r.color}"></div><span style="color:var(--text)">${r.name}</span></div>`
    ).join('');
    initRaceFlowInteraction();
  } catch(e) {
    status.textContent = `Fout: ${e.message}`;
  }
}

function rfSetWindow(hours) {
  if (!rfData) return;
  document.querySelectorAll('.rf-tb-btn').forEach(b => b.classList.remove('active'));
  if (!hours) {
    rfViewMs = null;
    document.getElementById('rfz-all').classList.add('active');
  } else {
    const startMs = rfData.raceStart || RACE_START.getTime();
    const endMs = Math.max(Date.now(), startMs + 1);
    rfViewMs = { minMs: endMs - hours * 3600000, maxMs: endMs };
    const el = document.getElementById('rfz-'+hours+'h');
    if (el) el.classList.add('active');
  }
  drawRaceFlowChart(rfData);
}

function rfZoom(factor) {
  if (!rfData) return;
  const startMs = rfData.raceStart || RACE_START.getTime();
  const now = Date.now();
  const curMin = rfViewMs ? rfViewMs.minMs : startMs;
  const curMax = rfViewMs ? rfViewMs.maxMs : now;
  const center = (curMin + curMax) / 2;
  const half = (curMax - curMin) / 2 * factor;
  rfViewMs = { minMs: Math.max(startMs, center - half), maxMs: Math.min(now, center + half) };
  document.querySelectorAll('.rf-tb-btn').forEach(b => b.classList.remove('active'));
  drawRaceFlowChart(rfData);
}

function rfResetZoom() {
  rfViewMs = null;
  document.querySelectorAll('.rf-tb-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('rfz-all').classList.add('active');
  if (rfData) drawRaceFlowChart(rfData);
}

function initRaceFlowInteraction() {
  const canvas = document.getElementById('raceflow-canvas');
  let dragStart = null, dragViewMs = null;

  canvas.onwheel = e => {
    e.preventDefault();
    rfZoom(e.deltaY > 0 ? 1.25 : 0.8);
  };
  canvas.onmousedown = e => {
    dragStart = e.clientX;
    dragViewMs = rfViewMs ? { ...rfViewMs } : (() => {
      const s = rfData.raceStart || RACE_START.getTime();
      return { minMs: s, maxMs: Date.now() };
    })();
    canvas.classList.add('dragging');
  };
  canvas.onmousemove = e => {
    if (!dragStart) return;
    const W = canvas.offsetWidth;
    const pad = 55 + 20;
    const span = dragViewMs.maxMs - dragViewMs.minMs;
    const dx = (dragStart - e.clientX) / (W - pad) * span;
    const startMs = rfData.raceStart || RACE_START.getTime();
    const newMin = Math.max(startMs, dragViewMs.minMs + dx);
    const newMax = Math.min(Date.now(), dragViewMs.maxMs + dx);
    rfViewMs = { minMs: newMin, maxMs: newMax };
    document.querySelectorAll('.rf-tb-btn').forEach(b => b.classList.remove('active'));
    drawRaceFlowChart(rfData);
  };
  canvas.onmouseup = canvas.onmouseleave = () => {
    dragStart = null; canvas.classList.remove('dragging');
  };
}

function drawRaceFlowChart({ riders, totalKm, raceStart }) {
  const canvas = document.getElementById('raceflow-canvas');
  const W = canvas.offsetWidth || 700;
  canvas.width  = W;
  canvas.height = 380;
  const ctx = canvas.getContext('2d');
  const pad = { top: 20, right: 20, bottom: 45, left: 55 };
  const cW  = W - pad.left - pad.right;
  const cH  = canvas.height - pad.top - pad.bottom;

  ctx.clearRect(0, 0, W, canvas.height);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, canvas.height);

  const now      = Date.now();
  const startMs  = raceStart || RACE_START.getTime();
  const viewMinMs = rfViewMs ? rfViewMs.minMs : startMs;
  const viewMaxMs = rfViewMs ? rfViewMs.maxMs : Math.max(now, startMs + 3600000);
  const spanH     = (viewMaxMs - viewMinMs) / 3600000;
  const maxKm     = totalKm || Math.max(1, ...riders.flatMap(r => r.pts.map(p => p[1])));
  // Determine visible km range based on visible data points
  const visibleKms = riders.flatMap(r => r.pts.filter(([t]) => t >= viewMinMs && t <= viewMaxMs).map(p => p[1]));
  const viewMinKm = 0;
  const viewMaxKm = maxKm;

  const xS = t  => pad.left + (t - viewMinMs) / (viewMaxMs - viewMinMs) * cW;
  const yS = km => pad.top  + (1 - (km - viewMinKm) / (viewMaxKm - viewMinKm)) * cH;

  ctx.strokeStyle = '#e3d4ac'; ctx.lineWidth = 1;
  const hStep = spanH > 24 ? 6 : spanH > 12 ? 4 : spanH > 6 ? 2 : 1;
  const startH = Math.ceil((viewMinMs - startMs) / 3600000);
  const endH   = Math.floor((viewMaxMs - startMs) / 3600000);
  for (let h = startH; h <= endH; h += hStep) {
    const x = xS(startMs + h * 3600000);
    if (x < pad.left || x > pad.left + cW) continue;
    ctx.beginPath(); ctx.moveTo(x, pad.top); ctx.lineTo(x, pad.top + cH); ctx.stroke();
    ctx.fillStyle = '#6b7280'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(`+${h}u`, x, pad.top + cH + 14);
  }
  const kmStep = viewMaxKm > 400 ? 100 : viewMaxKm > 200 ? 50 : 25;
  for (let km = 0; km <= viewMaxKm; km += kmStep) {
    const y = yS(km);
    if (y < pad.top || y > pad.top + cH + 2) continue;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + cW, y); ctx.stroke();
    ctx.fillStyle = '#6b7280'; ctx.font = '10px sans-serif'; ctx.textAlign = 'right';
    ctx.fillText(`${km} km`, pad.left - 6, y + 4);
  }

  ctx.strokeStyle = '#1c2635'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(pad.left, pad.top); ctx.lineTo(pad.left, pad.top + cH); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(pad.left, pad.top + cH); ctx.lineTo(pad.left + cW, pad.top + cH); ctx.stroke();

  // Clip to chart area
  ctx.save();
  ctx.rect(pad.left, pad.top, cW, cH);
  ctx.clip();

  for (const r of riders) {
    if (r.pts.length < 2) continue;
    ctx.strokeStyle = r.color || '#888';
    ctx.lineWidth   = 2.5;
    ctx.lineJoin    = 'round';
    ctx.beginPath();
    let started = false;
    for (const [t, km] of r.pts) {
      if (t < viewMinMs - 3600000 || t > viewMaxMs + 3600000) continue;
      const x = xS(t), y = yS(km);
      if (!started) { ctx.moveTo(x, y); started = true; } else ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
  ctx.restore(); // end clip
}

    document.getElementById('rrpf-' + id).classList.toggle('active', id === f)
  );

function nearestRoutePt(lat, lon) {
  let bestIdx = 0, bestDist = Infinity;
  for (let i = 0; i < routePts.length; i++) {
    const d = hav([lat, lon], routePts[i]);
    if (d < bestDist) { bestDist = d; bestIdx = i; }
  }
  return { idx: bestIdx, km: routeCum[bestIdx], dist: bestDist };
}

function showRouteRanking(clickedKm) {
  lastClickedKm = clickedKm;
  const elapsed = Date.now() - RACE_START.getTime();

  const passed = riders
    .filter(r => !r.scratched && (r.distanceOnTrack || 0) >= clickedKm && r.distanceOnTrack > 0)
    .map(r => {
      const id    = String(r.deviceId);
      const rHist = riderHistoryCache?.[id];
      let estMs, isActual = false;

      if (rHist && rHist.length >= 1) {
        for (let i = 0; i < rHist.length; i++) {
          if (rHist[i][0] >= clickedKm) {
            if (i === 0) {
              estMs = rHist[0][1] - RACE_START.getTime();
            } else {
              const [km0, t0] = rHist[i - 1], [km1, t1] = rHist[i];
              const frac = km1 > km0 ? (clickedKm - km0) / (km1 - km0) : 0;
              estMs = (t0 + frac * (t1 - t0)) - RACE_START.getTime();
            }
            isActual = true;
            break;
          }
        }
      }
      if (!isActual) estMs = (clickedKm / r.distanceOnTrack) * elapsed;

      const estTime = new Date(RACE_START.getTime() + estMs);
      return { ...r, estMs, estTime, isActual };
    })
    .sort((a, b) => a.estMs - b.estMs);

  const limit = routeRankingFilter === 'top10' ? 10
              : routeRankingFilter === 'top25' ? 25
              : Infinity;
  const shown = passed.slice(0, limit);
  const hasActual = shown.some(r => r.isActual);

  document.getElementById('rrp-km').textContent =
    `Km ${clickedKm.toFixed(1)} · ${passed.length} rijder${passed.length !== 1 ? 's' : ''} gepasseerd${hasActual ? '' : ' (schatting)'}`;

  const el = document.getElementById('rrp-list');
  if (shown.length === 0) {
    el.innerHTML = '<div class="rrp-empty">Nog geen rijders gepasseerd op dit punt</div>';
    return;
  }
  el.innerHTML = shown.map((r, i) => `
    <div class="rrp-row">
      <span class="rrp-rank">${i + 1}</span>
      <span class="rrp-dot" style="background:${r.riderColor || '#888'}"></span>
      <span class="rrp-name">${r.name}</span>
      <span class="rrp-time" title="${r.isActual ? 'Werkelijke doortijd' : 'Schatting o.b.v. gemiddelde snelheid'}">${r.isActual ? '' : '~'}${r.estTime.toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'})}</span>
    </div>`).join('');
}

function fmtDur(ms) {
  if (!ms || ms < 0) return '—';
  const totMin = Math.round(ms / 60000);
  const d = Math.floor(totMin / 1440);
  const h = Math.floor((totMin % 1440) / 60);
  const m = totMin % 60;
  if (d > 0) return `${d}d ${h}u ${m}m`;
  if (h > 0) return `${h}u ${m}m`;
  return `${m}m`;
}

function popupHtml(rd) {
  const km       = rd.distanceOnTrack ? rd.distanceOnTrack.toFixed(1) : '—';
  const finished = !rd.scratched && (rd.distanceOnTrack || 0) >= finishKm - 0.5;
  const status   = rd.scratched  ? '<span style="color:#b90a0a">DNF</span>'
    : finished                   ? '<span style="color:var(--green)">✓ Gefinisht</span>'
                                 : '<span style="color:var(--green)">Rijdend</span>';
  const id       = String(rd.deviceId);
  const hasTrack = !!riderTracks[id];
  const st       = rd._mstats;
  const statsHtml = st ? `
    <div class="pu-stats">
      <div class="pu-stat"><span>🚴 In beweging</span><b>${fmtDur(st.movingMs)}</b></div>
      <div class="pu-stat"><span>💨 Gem. tijdens fietsen</span><b>${st.avgMovingKmh.toFixed(1)} km/u</b></div>
      <div class="pu-stat"><span>⏱ Gem. incl. stops</span><b>${st.avgOverallKmh.toFixed(1)} km/u</b></div>
    </div>` : '';
  return `<div class="pu-name" style="color:${rd.riderColor}">${rd.name}</div>
    <div class="pu-meta">#${rd.teamNumber} · ${km} km · ${status}</div>
    ${statsHtml}
    <button class="pu-track-btn${hasTrack ? ' active' : ''}" style="margin-top:8px;width:100%;padding:6px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:${hasTrack?'var(--green)':'var(--muted)'};font-size:11px;cursor:pointer;font-family:inherit" onclick="toggleTrack('${id}')">
      ${hasTrack ? '✕ Verberg gereden route' : '↗ Toon gereden route'}
    </button>`;
}

// ── Leaderboard ────────────────────────────────────────────────────────
let filterText = '';
function filterList() {
  filterText = document.getElementById('search').value.toLowerCase();
  renderList();
}

function renderList() {
  const sorted   = [...riders].sort((a, b) => (b.distanceOnTrack || 0) - (a.distanceOnTrack || 0));
  const filtered = filterText ? sorted.filter(r => r.name.toLowerCase().includes(filterText)) : sorted;
  const el       = document.getElementById('rider-list');
  el.innerHTML   = '';

  function makeRow(rd, rank, badge, extraClass) {
    const row = document.createElement('div');
    row.className = 'rider-row' + (extraClass ? ' ' + extraClass : '');
    const rankTxt = (rank != null && rank !== '') ? rank : '';
    row.innerHTML = `
      <span class="r-rank">${rankTxt}</span>
      <span class="r-dot" style="background:${rd.riderColor || '#888'}"></span>
      <div class="r-info">
        <div class="r-name">${rd.name}</div>
        <div class="r-meta">${badge}</div>
      </div>`;
    row.addEventListener('click', () => {
      const m = markerMap[rd.deviceId];
      if (m) { map.setView(m.getLatLng(), 13); m.openPopup(); }
    });
    return row;
  }

  if (filterText) {
    let rank = 0;
    for (const rd of filtered) {
      const fin = !rd.scratched && (rd.distanceOnTrack || 0) >= finishKm - 0.5;
      if (!rd.scratched) rank++;
      const km  = rd.distanceOnTrack ? rd.distanceOnTrack.toFixed(1) : '—';
      const badge = rd.scratched ? '<span class="r-scratch">DNF</span>'
        : fin ? '<span class="r-fin">✓ Fin</span>'
               : `<span class="r-km">${km} km</span>`;
      el.appendChild(makeRow(rd, rd.scratched ? '' : rank, badge, rd.scratched ? 'scratched-row' : ''));
    }
    return;
  }

  const finishers = filtered.filter(r => !r.scratched && (r.distanceOnTrack || 0) >= finishKm - 0.5);
  const active    = filtered.filter(r => !r.scratched && (r.distanceOnTrack || 0) <  finishKm - 0.5);
  const dnf       = filtered.filter(r =>  r.scratched);

  const withTimes = finishers.map(r => {
    const hist = riderHistoryCache?.[String(r.deviceId)];
    let finTs = null;
    if (hist) for (const [km, ts] of hist) { if (km >= finishKm - 0.5) { finTs = ts; break; } }
    return { r, finTs };
  }).sort((a, b) => {
    if (a.finTs && b.finTs) return a.finTs - b.finTs;
    if (a.finTs) return -1;
    if (b.finTs) return 1;
    return (b.r.distanceOnTrack || 0) - (a.r.distanceOnTrack || 0);
  });

  const firstFinTs = withTimes[0]?.finTs ?? null;

  if (withTimes.length > 0) {
    const hdr = document.createElement('div');
    hdr.className = 'section-hdr';
    hdr.innerHTML = `<span>🏆 Gefinisht (${withTimes.length})</span><button class="section-collapse" onclick="toggleFinishers()">${finishersCollapsed ? '▸' : '▾'}</button>`;
    el.appendChild(hdr);

    if (!finishersCollapsed) {
      withTimes.forEach(({ r, finTs }, i) => {
        let badge;
        if (finTs) {
          if (i === 0) {
            const t = new Date(finTs).toLocaleTimeString('nl-NL', { hour:'2-digit', minute:'2-digit', timeZone:'Europe/Amsterdam' });
            badge = `<span class="r-fin">${t}</span>`;
          } else {
            badge = `<span class="r-fin" style="color:var(--muted)">+${durStr(finTs - firstFinTs)}</span>`;
          }
        } else {
          badge = `<span class="r-fin">✓ Fin</span>`;
        }
        el.appendChild(makeRow(r, i + 1, badge, ''));
      });
    }
  }

  if (active.length > 0) {
    const hdr = document.createElement('div');
    hdr.className = 'section-hdr';
    hdr.innerHTML = `<span>Nog onderweg (${active.length})</span>`;
    el.appendChild(hdr);
    const startRank = withTimes.length + 1;
    active.forEach((rd, i) => {
      const d = rd.distanceOnTrack || 0;
      const km = d > 0 ? d.toFixed(0) : '—';
      const remain = (finishKm !== Infinity && d > 0) ? Math.max(0, finishKm - d) : null;
      const badge = `<span class="r-km">${km} km</span>` +
        (remain != null ? `<span style="color:var(--muted)">${remain.toFixed(0)} te gaan</span>` : '');
      el.appendChild(makeRow(rd, startRank + i, badge, ''));
    });
  }

  if (dnf.length > 0) {
    dnf.forEach(rd => {
      el.appendChild(makeRow(rd, '', '<span class="r-scratch">DNF</span>', 'scratched-row'));
    });
  }
}

// ── Countdown ──────────────────────────────────────────────────────────
function startCountdown() {
  cdSecs = INTERVAL;
  clearInterval(cdTimer);
  cdTimer = setInterval(() => {
    cdSecs--;
    const m = Math.floor(cdSecs / 60), s = cdSecs % 60;
    document.getElementById('refresh-bar').textContent = `↺ ${m}:${String(s).padStart(2,'0')}`;
    if (cdSecs <= 0) { clearInterval(cdTimer); loadPositions().then(startCountdown); }
  }, 1000);
}

// ── Fly to leader ─────────────────────────────────────────
// Zet de leider laag in beeld (centrum boven de leider) zodat de route vóór hem zichtbaar is.
function setViewLeaderLow(latlng, zoom) {
  map.setView(latlng, zoom, { animate: false });
  const pt = map.project(latlng, zoom);
  pt.y -= map.getSize().y * 0.28;
  map.setView(map.unproject(pt, zoom), zoom, { animate: false });
}

function flyToLeader() {
  const leader = riders.filter(r => !r.scratched && r.latitude && r.longitude && r.distanceOnTrack > 0)
                       .sort((a, b) => (b.distanceOnTrack || 0) - (a.distanceOnTrack || 0))[0];
  if (leader) setViewLeaderLow([leader.latitude, leader.longitude], 12);
}

// ── Volledig scherm (Fullscreen API + CSS-fallback voor iOS Safari) ──────
let cssFsActive = false;
function inFullscreen() {
  return !!(document.fullscreenElement || document.webkitFullscreenElement || cssFsActive);
}
function afterFsChange() {
  const on = inFullscreen();
  document.getElementById('map-fs-close').style.display = on ? '' : 'none';
  document.getElementById('btn-fullscreen').classList.toggle('active', on);
  setTimeout(() => map.invalidateSize(), 120);
}
function toggleFullscreen() {
  const el = document.getElementById('map');
  if (inFullscreen()) {
    if (document.fullscreenElement || document.webkitFullscreenElement) {
      (document.exitFullscreen || document.webkitExitFullscreen).call(document);
    }
    if (cssFsActive) { el.classList.remove('map-fullscreen'); cssFsActive = false; afterFsChange(); }
  } else {
    const req = el.requestFullscreen || el.webkitRequestFullscreen;
    if (req) {
      Promise.resolve(req.call(el)).catch(() => { el.classList.add('map-fullscreen'); cssFsActive = true; afterFsChange(); });
    } else {
      el.classList.add('map-fullscreen'); cssFsActive = true; afterFsChange();
    }
  }
}
document.addEventListener('fullscreenchange', afterFsChange);
document.addEventListener('webkitfullscreenchange', afterFsChange);
document.addEventListener('keydown', e => { if (e.key === 'Escape' && cssFsActive) toggleFullscreen(); });

// ── Race-klok rechtsboven: racetijd + NL- en lokale tijd ───
let raceClockTimer = null;
function startRaceClock() {
  if (!raceConfig) return;
  const box = document.getElementById('race-clock');
  const startRef = new Date(raceConfig.officialStart || raceConfig.start).getTime();
  const localTz  = raceConfig.localTz || null;
  const nlFmt  = new Intl.DateTimeFormat('nl-NL', { hour:'2-digit', minute:'2-digit', timeZone:'Europe/Amsterdam' });
  const locFmt = localTz ? new Intl.DateTimeFormat('nl-NL', { hour:'2-digit', minute:'2-digit', timeZone: localTz }) : null;
  document.getElementById('rc-local-row').style.display = localTz ? '' : 'none';
  if (localTz) document.getElementById('rc-local-lbl').textContent = raceConfig.localTzLabel || '';
  box.style.display = '';
  function tick() {
    const now  = Date.now();
    const diff = now - startRef;
    const abs  = Math.abs(diff);
    const s = Math.floor(abs / 1000);
    const d = Math.floor(s / 86400), h = Math.floor((s % 86400) / 3600), m = Math.floor((s % 3600) / 60);
    const dur = `${d}d ${String(h).padStart(2,'0')}u ${String(m).padStart(2,'0')}m`;
    document.getElementById('rc-timer').textContent = diff < 0 ? '-' + dur : dur;
    document.getElementById('rc-label').textContent = diff < 0 ? 'tot start' : 'racetijd';
    document.getElementById('rc-nl').textContent = nlFmt.format(now);
    if (locFmt) document.getElementById('rc-local').textContent = locFmt.format(now);
  }
  tick();
  clearInterval(raceClockTimer);
  raceClockTimer = setInterval(tick, 1000);
}

// Vlieg naar Laurens ten Dam (alleen Tour Divide)
function flyToLau() {
  const r = riders.find(x => /laurens/i.test(x.name) && /\bdam\b/i.test(x.name));
  if (!r) return;
  const m = markerMap[String(r.deviceId)];
  if (m) { map.setView(m.getLatLng(), 13); m.openPopup(); }
  else if (r.latitude && r.longitude) { map.setView([r.latitude, r.longitude], 13); }
}

// ── Sidebar ────────────────────────────────────────────────────────────
function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  document.getElementById('sidebar').classList.toggle('collapsed', !sidebarOpen);
  setTimeout(() => map.invalidateSize(), 220);
}

document.getElementById('poi-input').addEventListener('keydown', e => { if (e.key === 'Enter') searchPoi(); });

// ── Route tabs ─────────────────────────────────────────────
let activeTab = 0;
let allRiders = []; // unfiltered positions

function initTabs() {
  const tabs = raceConfig?.tabs;
  if (!tabs?.length) return;
  const el = document.getElementById('route-tabs');
  el.style.display = 'flex';
  el.innerHTML = tabs.map((t, i) =>
    `<button class="tab-btn${i===0?' active':''}" onclick="switchTab(${i})">${t.label}</button>`
  ).join('');
}

async function switchTab(idx) {
  if (idx === activeTab && routeLayer) return;
  activeTab = idx;
  const tabs = raceConfig.tabs;
  // Update tab buttons
  document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
  // Load new route
  raceConfig.routeFile = tabs[idx].routeFile;
  if (routeLayer) routeLayer.forEach(l => l.remove());
  routeLayer = null; routePts = []; routeCum = []; finishKm = Infinity;
  gradientLayer = null; surfaceLayer = null;
  await loadRoute();
  // Filter riders by segment
  applyTabFilter();
}

function applyTabFilter() {
  const tabs = raceConfig?.tabs;
  if (!tabs?.length || !allRiders.length) return;
  const segs = tabs[activeTab].segments;
  riders = segs ? allRiders.filter(r => segs.includes(r.segment)) : allRiders;
  renderMarkers();
  updateLabelVisibility();
  renderList();
  mapCentered = false; // re-center on new tab's leader
}

// ── Init ───────────────────────────────────────────────────────────────
async function init() {
  initMap();
  if (!RC) {
    document.getElementById('race-title').textContent = 'Geen race geselecteerd';
    document.getElementById('status-txt').textContent = 'Gebruik ?race=fmc-code in de URL';
    return;
  }
  try {
    const r = await fetch(`${API}/api/fmc/${RC}/config`);
    if (r.ok) {
      raceConfig = await r.json();
      SLUG       = raceConfig.slug || '';
      RACE_START = new Date(raceConfig.start);
      document.title = `${raceConfig.name} — Bomba Tracker`;
      document.getElementById('race-title').textContent = raceConfig.name;
    }
  } catch(e) { console.warn('Config load failed:', e.message); }
  // Lau-knop alleen voor Tour Divide
  if (RC === 'tourdivide26') document.getElementById('btn-lau').style.display = '';
  initTabs();
  checkResults();
  checkOverlays();
  startRaceClock();
  loadRoute();
  loadPositions().then(startCountdown);
}
init();
</script>
